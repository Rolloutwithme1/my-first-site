<!DOCTYPE html>
<html>
<head>
    <title>LIDAR_SCAN | Rolloutwithme1</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        .hud {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; border: 2px solid rgba(0, 255, 204, 0.2);
            box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; padding: 20px;
        }
        .stats { color: #00ffcc; font-size: 14px; text-shadow: 0 0 5px #00ffcc; }
        .form-area {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 20, 20, 0.7); border: 1px solid #00ffcc;
            padding: 30px; border-radius: 10px; pointer-events: auto;
            text-align: center; color: #00ffcc; backdrop-filter: blur(10px);
        }
        input { background: transparent; border: 1px solid #00ffcc; color: #00ffcc; padding: 10px; margin: 10px 0; width: 200px; outline: none; }
        button { background: #00ffcc; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { box-shadow: 0 0 20px #00ffcc; }
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>

    <div class="hud">
        <div class="stats">
            [ COORDINATES: 40.7128° N, 74.0060° W ]<br>
            [ DEPTH_MAP: ACTIVE ]<br>
            [ CONNECTION: SECURE_SSL ]
        </div>
        <div class="stats" style="text-align: right;">
            SYSTEM_UPTIME: 99.9%<br>
            BATTERY: [||||||||--] 82%
        </div>
    </div>

    <div class="form-area">
        <h3>ACCESS TERMINAL</h3>
        <form action="https://formspree.io/f/mjgakbzq" method="POST">
            <input type="text" name="user" placeholder="ENGINEER_NAME" required><br>
            <input type="text" name="data" placeholder="UPLOAD_LOG" required><br>
            <button type="submit">INITIATE UPLOAD</button>
        </form>
    </div>

    <script>
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let stars = [];
        let numStars = 600;
        let speed = 2;

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < numStars; i++) {
                stars.push({
                    x: Math.random() * canvas.width - canvas.width / 2,
                    y: Math.random() * canvas.height - canvas.height / 2,
                    z: Math.random() * canvas.width,
                    o: Math.random()
                });
            }
        }

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.translate(canvas.width / 2, canvas.height / 2);

            for (let i = 0; i < numStars; i++) {
                let s = stars[i];
                let x = s.x / (s.z / canvas.width);
                let y = s.y / (s.z / canvas.width);
                let size = (1 - s.z / canvas.width) * 3;

                if (x < -canvas.width / 2 || x > canvas.width / 2 || y < -canvas.height / 2 || y > canvas.height / 2) {
                    s.z = canvas.width;
                } else {
                    s.z -= speed;
                    ctx.beginPath();
                    ctx.fillStyle = "#00ffcc";
                    ctx.arc(x, y, size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            ctx.translate(-canvas.width / 2, -canvas.height / 2);
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        draw();
    </script>
</body>
</html>V
