<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS_ULTRA_OS</title>
    <style>
        body { margin: 0; background: #000; color: #00f2ff; font-family: 'Courier New', monospace; overflow: hidden; display: flex; height: 100vh; }
        
        /* Sidebar Telemetry */
        .sidebar { width: 260px; border-right: 1px solid #00f2ff33; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; background: rgba(0, 15, 25, 0.8); z-index: 10; }
        .stat-box { margin-bottom: 15px; border: 1px solid #00f2ff; padding: 12px; font-size: 11px; background: rgba(0, 242, 255, 0.05); text-transform: uppercase; }
        .glitch-red { color: #ff0055; text-shadow: 0 0 8px #ff0055; border-color: #ff0055; }

        /* Main AI Core */
        .main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .core-visual { width: 240px; height: 240px; border: 3px solid #00f2ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; transition: 0.4s; box-shadow: 0 0 20px #00f2ff33; }
        .ring-anim { position: absolute; width: 90%; height: 90%; border: 1px dashed #00f2ff; border-radius: 50%; animation: spin 12s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .pulse-active { animation: throb 0.6s infinite alternate; border-color: #00f2ff; box-shadow: 0 0 80px #00f2ff; }
        @keyframes throb { from { transform: scale(1); } to { transform: scale(1.1); } }

        /* Terminal Display */
        #console { margin-top: 40px; width: 85%; background: rgba(0,0,0,0.9); border: 1px solid #00f2ff; padding: 20px; min-height: 120px; font-size: 14px; box-shadow: inset 0 0 15px #00f2ff22; border-radius: 5px; line-height: 1.5; }
        
        /* Sci-Fi Button */
        .btn-link { background: #00f2ff; color: #000; border: none; padding: 18px 50px; font-weight: bold; cursor: pointer; margin-top: 25px; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); transition: 0.3s; letter-spacing: 2px; }
        .btn-link:hover { background: #fff; box-shadow: 0 0 30px #fff; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div>
            <h3>> SENSORS</h3>
            <div class="stat-box" id="tempBox">MOTOR_TEMP: 38.2°C</div>
            <div class="stat-box" id="battBox">BATTERY: 92.4%</div>
            <div class="stat-box">SIGNAL: 5/5_STABLE</div>
            <div class="stat-box">GPS: 40.7128° N</div>
        </div>
        <div>
            <div class="stat-box glitch-red" id="secBox">SECURITY: SCANNING...</div>
            <small style="opacity:0.5">ID: ROLLOUT_WITH_ME_1</small>
        </div>
    </div>

    <div class="main">
        <div class="core-visual" id="core">
            <div class="ring-anim"></div>
            <span id="coreText" style="font-weight:bold; letter-spacing:2px;">STANDBY</span>
        </div>

        <div id="console">>> SYSTEM_READY: AWAITING_NEURAL_SYNC...</div>
        
        <button class="btn-link" onclick="initializeSystem()">[ INITIALIZE_LINK ]</button>
    </div>

    <script>
        const consoleLog = document.getElementById('console');
        const core = document.getElementById('core');
        const coreText = document.getElementById('coreText');
        
        // 1. Voice Synthesis (The Mouth)
        function speak(text) {
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.onstart = () => core.classList.add('pulse-active');
            utter.onend = () => core.classList.remove('pulse-active');
            utter.pitch = 0.65; // Deep mechanical voice
            utter.rate = 1.0;
            window.speechSynthesis.speak(utter);
        }

        // 2. Groq AI Brain (The Logic)
        async function fetchAI(userInput) {
            const key = localStorage.getItem("jarvis_key");
            if (!key) return;

            consoleLog.innerText = ">> PROCESSING_QUERY...";
            
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${key.trim()}`
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: "You are JARVIS. A robotic assistant. Be helpful but brief (under 20 words)." },
                            { role: "user", content: userInput }
                        ],
                        temperature: 0.6
                    })
                });

                const data = await response.json();

                if (response.status === 401 || response.status === 400) {
                    consoleLog.innerText = "!! ERROR: " + data.error.message;
                    localStorage.removeItem("jarvis_key"); // Reset key if bad
                } else if (data.choices) {
                    const reply = data.choices[0].message.content;
                    consoleLog.innerText = "JARVIS: " + reply;
                    speak(reply);
                }
            } catch (err) {
                consoleLog.innerText = "!! CONNECTION_CRITICAL_FAILURE !!";
                console.error(err);
            }
        }

        // 3. Voice Recognition (The Ears)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();

        recognition.onstart = () => {
            core.style.borderColor = "#ff0055";
            coreText.innerText = "LISTENING";
            consoleLog.innerText = ">> MICROPHONE_ACTIVE...";
        };

        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            consoleLog.innerText = "USER: " + text;
            fetchAI(text);
        };

        recognition.onend = () => {
            core.style.borderColor = "#00f2ff";
            coreText.innerText = "AI_IDLE";
        };

        // 4. System Initialization
        function initializeSystem() {
            const savedKey = localStorage.getItem("jarvis_key");
            
            if (!savedKey) {
                const input = prompt("NEURAL LINK REQUIRED: Please enter your Groq API Key (gsk_...)");
                if (input && input.startsWith("gsk_")) {
                    localStorage.setItem("jarvis_key", input);
                    consoleLog.innerText = ">> KEY_SAVED. LINK_STABILIZED.";
                    speak("System link established. Welcome back, Commander.");
                } else {
                    alert("Invalid Key Format. Access Denied.");
                }
            } else {
                recognition.start();
            }
        }

        // 5. Live Telemetry Loop
        setInterval(() => {
            const temp = (38 + Math.random() * 4).toFixed(1);
            const batt = (92 - (Date.now() % 100) / 1000).toFixed(1);
            document.getElementById('tempBox').innerText = `MOTOR_TEMP: ${temp}°C`;
            document.getElementById('battBox').innerText = `BATTERY: ${batt}%`;
            document.getElementById('secBox').innerText = `SECURITY: ${Math.floor(Math.random()*3)}%_THREAT`;
        }, 3000);
    </script>
</body>
</html>
