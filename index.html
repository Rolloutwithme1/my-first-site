<!DOCTYPE html>
<html>
<head>
    <title>HOLO_CORE | Rolloutwithme1</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        .ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; border: 2px solid rgba(0, 255, 255, 0.2); box-sizing: border-box;
        }
        .data-panel {
            position: absolute; top: 40px; left: 40px; color: #00ffff;
            background: rgba(0, 40, 40, 0.5); padding: 15px; border-left: 5px solid #00ffff;
            text-shadow: 0 0 10px #00ffff;
        }
        .upload-box {
            position: absolute; bottom: 40px; right: 40px;
            background: rgba(0, 0, 0, 0.8); border: 1px solid #00ffff;
            padding: 20px; pointer-events: auto;
        }
        input { background: #000; border: 1px solid #00ffff; color: #00ffff; padding: 10px; width: 200px; margin-bottom: 10px; }
        button { background: #00ffff; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <div class="data-panel">
            >> OBJECT: 3D_HEX_CORE<br>
            >> ROTATION: ACTIVE<br>
            >> STATUS: STABLE
        </div>
    </div>

    <div class="upload-box">
        <form action="https://formspree.io/f/mjgakbzq" method="POST">
            <input type="text" name="user" placeholder="PILOT_ID" required><br>
            <button type="submit">TRANSMIT_SYNC</button>
        </form>
    </div>

    <canvas id="hologram"></canvas>

    <script>
        const canvas = document.getElementById('hologram');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let points = [];
        let numPoints = 400;
        let angleX = 0;
        let angleY = 0;

        // Create a 3D Sphere of points
        for (let i = 0; i < numPoints; i++) {
            let theta = Math.acos(Math.random() * 2 - 1);
            let phi = Math.random() * Math.PI * 2;
            points.push({
                x: 200 * Math.sin(theta) * Math.cos(phi),
                y: 200 * Math.sin(theta) * Math.sin(phi),
                z: 200 * Math.cos(theta)
            });
        }

        function project(x, y, z) {
            let perspective = 600 / (600 + z);
            return {
                x: x * perspective + canvas.width / 2,
                y: y * perspective + canvas.height / 2,
                p: perspective
            };
        }

        function rotate(p, ax, ay) {
            // Rotate Y
            let x = p.x * Math.cos(ay) + p.z * Math.sin(ay);
            let z = p.z * Math.cos(ay) - p.x * Math.sin(ay);
            // Rotate X
            let y = p.y * Math.cos(ax) - z * Math.sin(ax);
            z = z * Math.cos(ax) + p.y * Math.sin(ax);
            return { x, y, z };
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            angleX += 0.01;
            angleY += 0.01;

            points.forEach(p => {
                let r = rotate(p, angleX, angleY);
                let proj = project(r.x, r.y, r.z);

                ctx.fillStyle = `rgba(0, 255, 255, ${proj.p})`;
                ctx.beginPath();
                ctx.arc(proj.x, proj.y, proj.p * 3, 0, Math.PI * 2);
                ctx.fill();

                // Add a digital "glitch" line occasionally
                if (Math.random() > 0.99) {
                    ctx.strokeStyle = 'rgba(0, 255, 255, 0.2)';
                    ctx.beginPath();
                    ctx.moveTo(proj.x, proj.y);
                    ctx.lineTo(canvas.width / 2, canvas.height / 2);
                    ctx.stroke();
                }
            });

            requestAnimationFrame(draw);
        }

        window.addEventListener('mousemove', (e) => {
            angleY = (e.clientX / canvas.width - 0.5) * 4;
            angleX = (e.clientY / canvas.height - 0.5) * 4;
        });

        draw();
    </script>
</body>
</html>
