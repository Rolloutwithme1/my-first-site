<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON GAMER HUB 🕹️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ea;
            --bg: #050505;
            --card: #121212;
            --success: #00ff88;
            --danger: #ff4d4d;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* --- VISUAL EFFECTS & ANIMATIONS --- */
        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
            width: 90%;
            max-width: 500px;
            text-align: center;
            position: relative;
            transition: all 0.3s ease;
        }

        /* Shake animation for wrong answers */
        .shake {
            animation: shake 0.4s ease-in-out;
            border-color: var(--danger) !important;
            box-shadow: 0 0 40px var(--danger) !important;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        /* Pulse for Correct answers */
        .pulse-success {
            animation: pulse 0.5s ease;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); border-color: var(--success); }
            100% { transform: scale(1); }
        }

        /* Fade in for content */
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden { display: none !important; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; margin-bottom: 20px; color: var(--neon-blue); font-size: 0.9rem;}

        /* BUTTONS */
        .mode-btn {
            background: transparent;
            color: white;
            border: 2px solid var(--neon-pink);
            padding: 20px;
            margin: 10px 0;
            width: 100%;
            font-size: 1.1rem;
            cursor: pointer;
            border-radius: 12px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .mode-btn:hover {
            background: var(--neon-pink);
            box-shadow: 0 0 20px var(--neon-pink);
            transform: scale(1.02);
        }

        /* GAME ELEMENTS */
        .q-img { width: 100%; border-radius: 15px; margin: 15px 0; border: 2px solid #333; }
        .ans-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        
        .ans-btn {
            padding: 15px;
            background: #1e1e1e;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            transition: 0.2s;
        }

        .correct { background: var(--success) !important; color: black !important; font-weight: bold; }
        .wrong { background: var(--danger) !important; color: white !important; }

        input {
            width: 85%;
            padding: 15px;
            background: #000;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            text-align: center;
            font-size: 1.5rem;
            border-radius: 10px;
            margin-top: 20px;
            font-family: 'Orbitron', sans-serif;
        }

        .scrambled { font-size: 2.2rem; color: var(--neon-pink); letter-spacing: 8px; margin: 20px 0; text-shadow: 0 0 10px var(--neon-pink); }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <div id="menu-screen">
        <h1 style="color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue);">GAMER HUB</h1>
        <p>CHOOSE YOUR MISSION</p>
        <button class="mode-btn" onclick="startMode('quiz')">🧠 PRO QUIZ</button>
        <button class="mode-btn" onclick="startMode('jumble')">🔠 JUMBLE WORD</button>
    </div>

    <div id="game-screen" class="hidden">
        <div class="header">
            <span id="lvl-count">LVL: 1/10</span>
            <span id="score-display">XP: 0</span>
        </div>
        
        <div id="game-content" class="fade-in">
            <div id="quiz-content">
                <img id="quiz-image" src="" class="q-img">
                <h3 id="quiz-question"></h3>
                <div id="quiz-options" class="ans-grid"></div>
            </div>

            <div id="jumble-content" class="hidden">
                <div id="jumble-emoji" style="font-size: 4rem;"></div>
                <div id="jumble-text" class="scrambled"></div>
                <input type="text" id="jumble-input" placeholder="GUESS WORD..." autocomplete="off">
            </div>
        </div>
        
        <p id="feedback" style="font-weight: bold; height: 20px;"></p>
    </div>

    <div id="end-screen" class="hidden">
        <h1 id="result-title">MISSION COMPLETE</h1>
        <h2 id="final-score" style="color: var(--neon-blue);">XP: 0</h2>
        <button class="mode-btn" onclick="location.reload()">RESTART HUB</button>
    </div>
</div>

<script>
    // SOUNDS
    const winSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3');
    const loseSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3');

    let currentIdx = 0;
    let score = 0;
    let activeMode = '';

    const quizData = [
        { q: "Which planet is the Red Planet?", img: "https://images.unsplash.com/photo-1614728894747-a83421e2b9c9?w=400", a: [{t:"Mars", c:true}, {t:"Venus", c:false}, {t:"Saturn", c:false}, {t:"Jupiter", c:false}] },
        { q: "Who created Bitcoin?", img: "https://images.unsplash.com/photo-1518546305927-5a555bb7020d?w=400", a: [{t:"Satoshi", c:true}, {t:"Musk", c:false}, {t:"Gates", c:false}, {t:"Jobs", c:false}] },
        { q: "Fastest land animal?", img: "https://images.unsplash.com/photo-1534177714508-8579ee4b6c33?w=400", a: [{t:"Lion", c:false}, {t:"Cheetah", c:true}, {t:"Eagle", c:false}, {t:"Deer", c:false}] },
        { q: "Game with Master Chief?", img: "https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400", a: [{t:"Halo", c:true}, {t:"Doom", c:false}, {t:"CoD", c:false}, {t:"Destiny", c:false}] },
        { q: "Capital of France?", img: "https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=400", a: [{t:"Paris", c:true}, {t:"Berlin", c:false}, {t:"Rome", c:false}, {t:"Madrid", c:false}] },
        { q: "Who made iPhone?", img: "https://images.unsplash.com/photo-1510557880182-3d4d3cba35a5?w=400", a: [{t:"Samsung", c:false}, {t:"Apple", c:true}, {t:"Sony", c:false}, {t:"LG", c:false}] },
        { q: "What is 5 + 5 * 5?", img: "https://images.unsplash.com/photo-1635070041078-e363dbe005cb?w=400", a: [{t:"50", c:false}, {t:"30", c:true}, {t:"25", c:false}, {t:"15", c:false}] },
        { q: "Largest Ocean?", img: "https://images.unsplash.com/photo-1439405326854-014607f694d7?w=400", a: [{t:"Atlantic", c:false}, {t:"Pacific", c:true}, {t:"Indian", c:false}, {t:"Arctic", c:false}] },
        { q: "Who painted Mona Lisa?", img: "https://images.unsplash.com/photo-1544767331-1582887493ef?w=400", a: [{t:"Da Vinci", c:true}, {t:"Picasso", c:false}, {t:"Dali", c:false}, {t:"Monet", c:false}] },
        { q: "Liquid Metal?", img: "https://images.unsplash.com/photo-1558591710-4b4a1ae0f04d?w=400", a: [{t:"Gold", c:false}, {t:"Mercury", c:true}, {t:"Lead", c:false}, {t:"Zinc", c:false}] }
    ];

    const jumbleData = [
        { c: "PYTHON", j: "THYOPN", e: "🐍" },
        { c: "GOOGLE", j: "EGOLGO", e: "🔍" },
        { c: "ROBLOX", j: "XOLBRO", e: "🧱" },
        { c: "MINECRAFT", j: "FTARCNIEM", e: "⛏️" },
        { c: "GALAXY", j: "AYXALG", e: "🌌" },
        { c: "DIAMOND", j: "NOMDAID", e: "💎" },
        { c: "FORTS", j: "STROF", e: "🏰" },
        { c: "SPIDERMAN", j: "NAMREDIPS", e: "🕷️" },
        { c: "HAMBURGER", j: "REGRUBMAH", e: "🍔" },
        { c: "YOUTUBE", j: "EBTUOUY", e: "📺" }
    ];

    function startMode(mode) {
        activeMode = mode;
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        loadLevel();
    }

    function loadLevel() {
        if(currentIdx >= 10) return showEnd();
        
        // Refresh animation
        const content = document.getElementById('game-content');
        content.classList.remove('fade-in');
        void content.offsetWidth; // Trigger reflow
        content.classList.add('fade-in');

        document.getElementById('lvl-count').innerText = `LVL: ${currentIdx+1}/10`;
        document.getElementById('feedback').innerText = "";

        if(activeMode === 'quiz') {
            const data = quizData[currentIdx];
            document.getElementById('quiz-image').src = data.img;
            document.getElementById('quiz-question').innerText = data.q;
            const options = document.getElementById('quiz-options');
            options.innerHTML = '';
            data.a.forEach(ans => {
                const btn = document.createElement('button');
                btn.className = 'ans-btn';
                btn.innerText = ans.t;
                btn.onclick = () => checkQuiz(btn, ans.c);
                options.appendChild(btn);
            });
        } else {
            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('jumble-content').classList.remove('hidden');
            const data = jumbleData[currentIdx];
            document.getElementById('jumble-text').innerText = data.j;
            document.getElementById('jumble-emoji').innerText = data.e;
            document.getElementById('jumble-input').value = '';
            document.getElementById('jumble-input').focus();
        }
    }

    function checkQuiz(btn, isCorrect) {
        const container = document.getElementById('main-container');
        document.querySelectorAll('.ans-btn').forEach(b => b.disabled = true);
        
        if(isCorrect) {
            btn.classList.add('correct');
            container.classList.add('pulse-success');
            score += 100;
            winSound.play();
            setTimeout(() => container.classList.remove('pulse-success'), 500);
        } else {
            btn.classList.add('wrong');
            container.classList.add('shake');
            loseSound.play();
            setTimeout(() => container.classList.remove('shake'), 500);
        }
        updateScore();
        setTimeout(nextLvl, 1200);
    }

    document.getElementById('jumble-input').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') {
            const container = document.getElementById('main-container');
            const val = e.target.value.toUpperCase();
            if(val === jumbleData[currentIdx].c) {
                score += 100;
                winSound.play();
                container.classList.add('pulse-success');
                setTimeout(() => container.classList.remove('pulse-success'), 500);
            } else {
                loseSound.play();
                container.classList.add('shake');
                setTimeout(() => container.classList.remove('shake'), 500);
            }
            updateScore();
            setTimeout(nextLvl, 1200);
        }
    });

    function nextLvl() {
        currentIdx++;
        loadLevel();
    }

    function updateScore() {
        document.getElementById('score-display').innerText = `XP: ${score}`;
    }

    function showEnd() {
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('end-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = `TOTAL XP: ${score}`;
    }
</script>
</body>
</html>
