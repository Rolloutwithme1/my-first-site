<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate GK Quiz Challenge</title>
    <style>
        /* CSS: The Visuals */
        :root {
            --primary: #4834d4;
            --secondary: #686de0;
            --success: #6ab04c;
            --error: #eb4d4b;
            --dark: #130f40;
            --light: #f9f9f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--dark);
        }

        .game-card {
            background: white;
            width: 90%;
            max-width: 450px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
        }

        .hidden { display: none !important; }

        /* Timer Bar */
        .timer-container {
            width: 100%;
            height: 10px;
            background: #eee;
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
        }

        #timer-bar {
            height: 100%;
            background: var(--primary);
            width: 100%;
            transition: width 1s linear;
        }

        /* Buttons */
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            padding: 12px 20px;
            border: 2px solid #eee;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: 0.2s;
        }

        button:hover:not(:disabled) {
            border-color: var(--primary);
            background: #f0f0ff;
            transform: translateY(-2px);
        }

        .start-btn, .next-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 100%;
            margin-top: 20px;
            font-size: 1.1rem;
        }

        .correct { background-color: var(--success) !important; color: white; border: none; }
        .wrong { background-color: var(--error) !important; color: white; border: none; }

        #score-text { font-size: 1.2rem; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

    <div class="game-card">
        <div id="start-screen">
            <h1 style="margin-top:0;">Global GK Quiz</h1>
            <p>Ready to test your brain? 10 seconds per question!</p>
            <button class="start-btn" onclick="startGame()">START GAME</button>
        </div>

        <div id="quiz-screen" class="hidden">
            <div style="display:flex; justify-content: space-between;">
                <span id="question-count">Question 1/5</span>
                <span id="score-display">Score: 0</span>
            </div>
            <div class="timer-container"><div id="timer-bar"></div></div>
            <h2 id="question-text">Loading question...</h2>
            <div id="answer-grid" class="btn-grid"></div>
            <button id="next-btn" class="next-btn hidden">Next Question →</button>
        </div>

        <div id="result-screen" class="hidden">
            <h2>Quiz Complete!</h2>
            <p id="score-text"></p>
            <p id="feedback-msg"></p>
            <button class="start-btn" onclick="location.reload()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        // Game Data
        const questions = [
            { q: "Which is the largest country in the world by area?", a: [ {t:"China", c:false}, {t:"Russia", c:true}, {t:"USA", c:false}, {t:"Canada", c:false} ] },
            { q: "Which element is diamond made of?", a: [ {t:"Gold", c:false}, {t:"Silver", c:false}, {t:"Carbon", c:true}, {t:"Iron", c:false} ] },
            { q: "Which is the longest river in the world?", a: [ {t:"Amazon", c:false}, {t:"Nile", c:true}, {t:"Yangtze", c:false}, {t:"Mississippi", c:false} ] },
            { q: "Who was the first man to step on the Moon?", a: [ {t:"Yuri Gagarin", c:false}, {t:"Buzz Aldrin", c:false}, {t:"Neil Armstrong", c:true}, {t:"Elon Musk", c:false} ] },
            { q: "What is the hardest natural substance on Earth?", a: [ {t:"Steel", c:false}, {t:"Diamond", c:true}, {t:"Quartz", c:false}, {t:"Granite", c:false} ] }
        ];

        let currentIdx = 0;
        let score = 0;
        let timer;
        let timeLeft = 10;

        // Elements
        const startScreen = document.getElementById('start-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const questionText = document.getElementById('question-text');
        const answerGrid = document.getElementById('answer-grid');
        const nextBtn = document.getElementById('next-btn');
        const timerBar = document.getElementById('timer-bar');

        function startGame() {
            startScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            resetState();
            let q = questions[currentIdx];
            questionText.innerText = q.q;
            document.getElementById('question-count').innerText = `Question ${currentIdx + 1}/${questions.length}`;

            q.a.forEach(ans => {
                const button = document.createElement('button');
                button.innerText = ans.t;
                button.onclick = () => selectAnswer(button, ans.c);
                answerGrid.appendChild(button);
            });
            startTimer();
        }

        function startTimer() {
            timeLeft = 10;
            timerBar.style.width = "100%";
            timer = setInterval(() => {
                timeLeft--;
                timerBar.style.width = (timeLeft * 10) + "%";
                if(timeLeft <= 0) {
                    clearInterval(timer);
                    autoFail();
                }
            }, 1000);
        }

        function resetState() {
            clearInterval(timer);
            nextBtn.classList.add('hidden');
            while (answerGrid.firstChild) answerGrid.removeChild(answerGrid.firstChild);
        }

        function selectAnswer(btn, isCorrect) {
            clearInterval(timer);
            const allBtns = answerGrid.querySelectorAll('button');
            allBtns.forEach(b => b.disabled = true);

            if(isCorrect) {
                btn.classList.add('correct');
                score += 20;
            } else {
                btn.classList.add('wrong');
                // Show correct answer
                const correctIndex = questions[currentIdx].a.findIndex(x => x.c);
                allBtns[correctIndex].classList.add('correct');
            }

            document.getElementById('score-display').innerText = `Score: ${score}`;
            nextBtn.classList.remove('hidden');
        }

        function autoFail() {
            const allBtns = answerGrid.querySelectorAll('button');
            allBtns.forEach(b => b.disabled = true);
            nextBtn.classList.remove('hidden');
        }

        nextBtn.onclick = () => {
            currentIdx++;
            if(currentIdx < questions.length) {
                showQuestion();
            } else {
                showResults();
            }
        };

        function showResults() {
            quizScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            document.getElementById('score-text').innerText = `Your Final Score: ${score} / 100`;
            document.getElementById('feedback-msg').innerText = score >= 60 ? "Excellent Job! 🏆" : "Keep Practicing! 📚";
        }
    </script>
</body>
</html>
