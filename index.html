<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON COMMANDER: STREAK EDITION 🔥</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        :root { --blue: #00f2ff; --pink: #ff00ea; --bg: #050505; --card: #121212; --green: #00ff88; --red: #ff4d4d; --fire: #ff6a00; }
        body { font-family: 'Orbitron', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        
        .container { background: var(--card); padding: 25px; border-radius: 20px; border: 2px solid var(--blue); box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); width: 95%; max-width: 500px; text-align: center; position: relative; }
        .hidden { display: none !important; }

        /* Timer Bar */
        .timer-box { width: 100%; height: 10px; background: #222; border-radius: 5px; margin: 15px 0; overflow: hidden; border: 1px solid var(--blue); }
        #timer-fill { height: 100%; width: 100%; background: linear-gradient(to right, var(--blue), var(--pink)); transition: width 1s linear; }

        /* Streak & Fire FX */
        #score-tracker { transition: 0.3s; font-weight: bold; }
        .on-fire { color: var(--fire) !important; text-shadow: 0 0 10px #ffae00, 0 0 20px #ff6a00, 0 0 30px #ff0000; animation: burn 0.5s infinite alternate; }
        @keyframes burn { from { transform: scale(1); } to { transform: scale(1.1); } }

        #streak-popup { position: absolute; top: 20%; left: 50%; transform: translate(-50%, -50%); color: var(--fire); font-size: 3rem; font-weight: 900; z-index: 50; pointer-events: none; text-shadow: 0 0 20px var(--fire); animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); } 100% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); } }

        /* Grid & Buttons */
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 20px 0; }
        .num-btn { padding: 15px; background: #222; border: 1px solid var(--blue); color: white; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .num-btn.done { border-color: var(--pink); color: var(--pink); opacity: 0.6; }

        .ans-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .ans-btn { padding: 15px; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 8px; cursor: pointer; font-family: 'Orbitron'; }
        .correct { background: var(--green) !important; color: black !important; }
        .wrong { background: var(--red) !important; }
        
        input { width: 80%; padding: 15px; background: #000; border: 2px solid var(--blue); color: white; text-align: center; border-radius: 10px; font-size: 1.2rem; font-family: 'Orbitron'; margin-bottom: 10px;}
        .btn-main { background: var(--blue); color: black; padding: 12px 25px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-8px);} 75% {transform: translateX(8px);} }
    </style>
</head>
<body>

<div class="container" id="game-container">
    <div id="streak-popup" class="hidden">STREAK!! 🔥</div>

    <div id="level-screen">
        <h1 style="color: var(--blue);">MISSION HUB</h1>
        <div style="background:#1e1e1e; padding:15px; border-radius:10px; border-left:5px solid var(--pink); cursor:pointer;" onclick="startLevel(1)">LVL 1: GK QUIZ 🧠</div>
        <div id="lv2" style="background:#1e1e1e; padding:15px; border-radius:10px; border-left:5px solid #444; margin-top:10px; opacity:0.5;">LVL 2: JUMBLE (Unlock at 7 pts)</div>
    </div>

    <div id="grid-screen" class="hidden">
        <h2 id="score-tracker">Score: 0/7</h2>
        <div class="grid" id="number-grid"></div>
    </div>

    <div id="play-screen" class="hidden">
        <div class="timer-box"><div id="timer-fill"></div></div>
        <h3 id="q-text">Question</h3>
        <div id="game-area"></div>
        <div id="result-overlay" class="hidden">
            <p id="feedback-text"></p>
            <button class="btn-main" onclick="backToGrid()">NEXT</button>
        </div>
    </div>
</div>

<script>
    let currentLvl = 1;
    let score = 0;
    let streak = 0;
    let finishedNums = [];
    let timerInterval;
    let timeLeft = 15;

    const winSnd = new Audio('https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3');
    const loseSnd = new Audio('https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3');

    const data = {
        1: [
            { q: "Capital of India?", a: [{t:"Delhi", c:true}, {t:"Mumbai", c:false}] },
            { q: "Red Planet?", a: [{t:"Mars", c:true}, {t:"Venus", c:false}] },
            { q: "Water formula?", a: [{t:"H2O", c:true}, {t:"CO2", c:false}] },
            { q: "Biggest Animal?", a: [{t:"Blue Whale", c:true}, {t:"Shark", c:false}] },
            { q: "Sun is a...?", a: [{t:"Star", c:true}, {t:"Planet", c:false}] },
            { q: "7 + 3?", a: [{t:"10", c:true}, {t:"21", c:false}] },
            { q: "Color of sky?", a: [{t:"Blue", c:true}, {t:"Green", c:false}] },
            { q: "King of Jungle?", a: [{t:"Lion", c:true}, {t:"Tiger", c:false}] },
            { q: "20 / 4?", a: [{t:"5", c:true}, {t:"4", c:false}] },
            { q: "Fastest man?", a: [{t:"Usain Bolt", c:true}, {t:"Me", c:false}] }
        ]
    };

    function startLevel(l) {
        currentLvl = l; score = 0; streak = 0; finishedNums = [];
        document.getElementById('level-screen').classList.add('hidden');
        document.getElementById('grid-screen').classList.remove('hidden');
        genGrid();
    }

    function genGrid() {
        const grid = document.getElementById('number-grid');
        grid.innerHTML = '';
        for(let i=1; i<=10; i++) {
            const b = document.createElement('button');
            b.className = finishedNums.includes(i-1) ? 'num-btn done' : 'num-btn';
            b.innerText = i;
            b.disabled = finishedNums.includes(i-1);
            b.onclick = () => loadQ(i-1);
            grid.appendChild(b);
        }
    }

    function loadQ(idx) {
        document.getElementById('grid-screen').classList.add('hidden');
        document.getElementById('play-screen').classList.remove('hidden');
        document.getElementById('result-overlay').classList.add('hidden');
        const area = document.getElementById('game-area');
        area.innerHTML = '';
        finishedNums.push(idx);
        
        const qData = data[currentLvl][idx];
        document.getElementById('q-text').innerText = qData.q;

        const g = document.createElement('div'); g.className = 'ans-grid';
        qData.a.forEach(opt => {
            const b = document.createElement('button'); b.className = 'ans-btn';
            b.innerText = opt.t; b.onclick = () => check(opt.c, b);
            g.appendChild(b);
        });
        area.appendChild(g);
        startTimer();
    }

    function startTimer() {
        timeLeft = 15;
        const fill = document.getElementById('timer-fill');
        fill.style.width = '100%';
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            fill.style.width = (timeLeft / 15 * 100) + '%';
            if(timeLeft <= 0) { clearInterval(timerInterval); check(false, null); }
        }, 1000);
    }

    function check(isCorrect, btn) {
        clearInterval(timerInterval);
        const tracker = document.getElementById('score-tracker');
        
        if(isCorrect) {
            if(btn) btn.classList.add('correct');
            score++;
            streak++;
            winSnd.play();
            
            if(streak >= 3) {
                tracker.classList.add('on-fire');
                showStreakPopup();
            }
        } else {
            if(btn) btn.classList.add('wrong');
            streak = 0;
            tracker.classList.remove('on-fire');
            loseSnd.play();
            document.getElementById('game-container').classList.add('shake');
            setTimeout(() => document.getElementById('game-container').classList.remove('shake'), 400);
        }

        tracker.innerText = `Score: ${score}/7 ${streak > 0 ? ' (Combo: ' + streak + ')' : ''}`;
        document.getElementById('result-overlay').classList.remove('hidden');
        document.getElementById('feedback-text').innerText = isCorrect ? "PERFECT! ✅" : "FAILED! ❌";
        
        if(score >= 7) {
            setTimeout(() => { alert("LEVEL CLEARED! MISSION ACCOMPLISHED!"); location.reload(); }, 1000);
        }
    }

    function showStreakPopup() {
        const p = document.getElementById('streak-popup');
        p.classList.remove('hidden');
        setTimeout(() => p.classList.add('hidden'), 1000);
    }

    function backToGrid() {
        document.getElementById('grid-screen').classList.remove('hidden');
        document.getElementById('play-screen').classList.add('hidden');
        genGrid();
    }
</script>
</body>
</html>
