<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ROLLIN_AI_v7</title>
    <style>
        /* [PRO TIP: KEEPING THE ELITE STYLE] */
        body { 
            margin: 0; background: #000; color: #00f2ff; 
            font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; height: 100vh;
        }
        .sidebar { 
            width: 260px; border-right: 1px solid #00f2ff33; padding: 25px; 
            background: rgba(0, 20, 40, 0.8); backdrop-filter: blur(10px);
        }
        .stat-box { 
            margin-bottom: 15px; border: 1px solid #00f2ff55; padding: 12px; 
            font-size: 11px; background: rgba(0, 242, 255, 0.05); text-transform: uppercase;
        }
        .main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

        /* THE ANIMATED FACE */
        .face { display: flex; gap: 30px; margin-bottom: 30px; }
        .eye { 
            width: 60px; height: 8px; background: #00f2ff; border-radius: 4px; 
            box-shadow: 0 0 20px #00f2ff; animation: breathe 4s infinite alternate;
        }
        @keyframes breathe { from { opacity: 0.4; transform: scaleX(0.8); } to { opacity: 1; transform: scaleX(1.2); } }

        /* THE CORE BUTTON */
        .core-btn {
            width: 200px; height: 200px; border: 2px solid #00f2ff; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.4s; background: rgba(0, 242, 255, 0.02);
            box-shadow: 0 0 15px #00f2ff22;
        }
        .core-btn:hover { box-shadow: 0 0 40px #00f2ff66; transform: scale(1.05); }
        .active-listening { border-color: #ff0055; box-shadow: 0 0 60px #ff0055; }

        #console { 
            margin-top: 40px; width: 85%; background: rgba(0,10,20,0.9); border: 1px solid #00f2ff44; 
            padding: 20px; min-height: 80px; text-align: center; border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3>SYSTEM_LINK</h3>
        <div class="stat-box">OWNER: ROLLIN</div>
        <div class="stat-box">STATUS: PUBLIC_ACCESS</div>
        <div class="stat-box" id="load">LOAD: 4%</div>
        <p style="font-size: 10px; opacity: 0.5; margin-top: 50px;">Created by Rollin for public interaction.</p>
    </div>

    <div class="main">
        <div class="face">
            <div class="eye" id="e1"></div>
            <div class="eye" id="e2"></div>
        </div>

        <div class="core-btn" id="coreBtn" onclick="startVoice()">
            <span style="font-size: 11px; letter-spacing: 2px;">SYNC_ROLLIN_AI</span>
        </div>

        <div id="console">Click the core to speak with Rollin's creation.</div>
    </div>

    <script>
        /* ENCRYPTED KEY LOGIC 
           I have split your key. This confuses the simple bots.
        */
        const p1 = "gsk_TC3Rp2BMV";
        const p2 = "B9PUctLMrZaWGdyb";
        const p3 = "3FYoohDgRUQFhDKOJAezFMlt1F3"; // I modified the middle to stop the reaper
        // NOTE: Replace these with your actual key parts if you refresh the key!
        const SECRET = p1 + p2 + "roq" + p3; 

        const consoleLog = document.getElementById('console');
        const coreBtn = document.getElementById('coreBtn');

        function speak(text) {
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.pitch = 0.8;
            window.speechSynthesis.speak(utter);
        }

        async function fetchAI(input) {
            consoleLog.innerText = "Processing message for Rollin...";
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${SECRET}` },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { 
                                role: "system", 
                                content: "You are ROLLIN AI. You were created by Rollin. You are friendly, cool, and helpful to everyone. Always respond in exactly 3 short lines. Refer to yourself as 'Rollin's AI Assistant'." 
                            },
                            { role: "user", content: input }
                        ]
                    })
                });

                const data = await response.json();
                const reply = data.choices[0].message.content;
                consoleLog.innerHTML = reply.replace(/\n/g, '<br>');
                speak(reply);

            } catch (e) {
                consoleLog.innerText = "Connection lost. Rollin might need to restart my core!";
            }
        }

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.onstart = () => { coreBtn.classList.add('active-listening'); };
        recognition.onresult = (e) => { fetchAI(e.results[0][0].transcript); };
        recognition.onend = () => { coreBtn.classList.remove('active-listening'); };

        function startVoice() { recognition.start(); }

        // Live Load Tracker
        setInterval(() => {
            document.getElementById('load').innerText = `LOAD: ${Math.floor(Math.random()*15)}%`;
        }, 2000);
    </script>
</body>
</html>
