<!DOCTYPE html>
<html>
<head>
    <title>SWARM_AI | Rolloutwithme1</title>
    <style>
        body { margin: 0; background: #00050a; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        .hud-top {
            position: absolute; top: 20px; width: 100%; display: flex;
            justify-content: space-around; color: #ffcc00; pointer-events: none;
            text-shadow: 0 0 8px #ffcc00; font-size: 12px;
        }
        .drone-count { border: 1px solid #ffcc00; padding: 5px 15px; background: rgba(255, 204, 0, 0.1); }
        .cmd-panel {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 5, 10, 0.9); border: 1px solid #ffcc00;
            padding: 20px; color: #ffcc00; pointer-events: auto; width: 300px;
        }
        button { background: #ffcc00; color: #000; border: none; padding: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="hud-top">
        <div class="drone-count">DRONES_ACTIVE: 100</div>
        <div class="drone-count">MODE: AUTONOMOUS_FLOCKING</div>
        <div class="drone-count">SIGNAL: 100%</div>
    </div>

    <div class="cmd-panel">
        <p>> TRANSMIT SWARM COMMAND</p>
        <form action="https://formspree.io/f/mjgakbzq" method="POST">
            <input type="text" name="cmd" placeholder="ENTER_MISSION_CODE" style="width:100%; background:black; border:1px solid #ffcc00; color:#ffcc00; padding:8px; box-sizing:border-box;">
            <button type="submit">UPLOAD_TO_SWARM</button>
        </form>
    </div>

    <canvas id="swarmCanvas"></canvas>

    <script>
        const canvas = document.getElementById('swarmCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const drones = [];
        const mouse = { x: canvas.width/2, y: canvas.height/2 };

        window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });

        class Drone {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = Math.random() * 2 - 1;
                this.vy = Math.random() * 2 - 1;
                this.accel = 0.05;
            }
            update() {
                // Steering logic toward mouse
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist > 5) {
                    this.vx += (dx / dist) * this.accel;
                    this.vy += (dy / dist) * this.accel;
                }

                // Friction (limits speed)
                this.vx *= 0.98;
                this.vy *= 0.98;

                this.x += this.vx;
                this.y += this.vy;

                // Wrap screen
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
            }
            draw() {
                let angle = Math.atan2(this.vy, this.vx);
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(angle);
                ctx.beginPath();
                ctx.moveTo(10, 0);
                ctx.lineTo(-5, 5);
                ctx.lineTo(-5, -5);
                ctx.closePath();
                ctx.fillStyle = "#ffcc00";
                ctx.fill();
                ctx.restore();
            }
        }

        for(let i=0; i<100; i++) drones.push(new Drone());

        function animate() {
            ctx.fillStyle = 'rgba(0, 5, 10, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drones.forEach(d => { d.update(); d.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
