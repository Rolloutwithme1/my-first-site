<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JARVIS_MISSION_CONTROL_v2</title>
    <style>
        body { margin: 0; background: #000; color: #00f2ff; font-family: 'Courier New', monospace; overflow: hidden; display: flex; height: 100vh; }
        .sidebar { width: 250px; border-right: 1px solid #00f2ff33; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; background: rgba(0, 20, 30, 0.5); z-index: 10; }
        .stat-box { margin-bottom: 20px; border: 1px solid #00f2ff; padding: 10px; font-size: 12px; transition: 0.3s; }
        .glitch-red { color: #ff0055; text-shadow: 0 0 5px #ff0055; }
        .main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .core-visual { width: 220px; height: 220px; border: 2px solid #00f2ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px #00f2ff22; position: relative; }
        .ring-anim { position: absolute; width: 100%; height: 100%; border: 1px dashed #00f2ff; border-radius: 50%; animation: spin 10s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #console { margin-top: 30px; width: 80%; background: rgba(0,0,0,0.8); border: 1px solid #00f2ff; padding: 15px; min-height: 100px; font-size: 14px; overflow-y: auto; box-shadow: inset 0 0 10px #00f2ff22; }
        .btn-activate { background: #00f2ff; color: #000; border: none; padding: 15px 40px; font-weight: bold; cursor: pointer; margin-top: 20px; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); transition: 0.3s; }
        .btn-activate:hover { background: #fff; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div>
            <h3>> SENSORS</h3>
            <div class="stat-box" id="tempBox">MOTOR_TEMP: 42.0°C</div>
            <div class="stat-box" id="battBox">BATTERY: 88.0%</div>
            <div class="stat-box">GPS: 40.7128° N</div>
        </div>
        <div>
            <div class="stat-box glitch-red" id="secBox">SECURITY: SCANNING...</div>
            <small>USER: ROLLOUT_WITH_ME_1</small>
        </div>
    </div>

    <div class="main">
        <div class="core-visual" id="core">
            <div class="ring-anim"></div>
            <span id="coreText">AI_IDLE</span>
        </div>
        <div id="console">>> TERMINAL_ONLINE: AWAITING_SYNC...</div>
        <button class="btn-activate" onclick="startJarvis()">[ INITIALIZE_VOICE ]</button>
    </div>

    <script>
        // YOUR NEW KEY
        const GROQ_KEY = "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";
        const consoleLog = document.getElementById('console');
        const core = document.getElementById('core');
        const coreText = document.getElementById('coreText');

        // 1. Robotic Voice
        function speak(text) {
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.pitch = 0.7;
            window.speechSynthesis.speak(utter);
        }

        // 2. LIVE SENSOR LOOP
        function updateLiveStats() {
            const temp = (40 + Math.random() * 5).toFixed(1);
            const batt = (87 + Math.random() * 2).toFixed(1);
            document.getElementById('tempBox').innerText = `MOTOR_TEMP: ${temp}°C`;
            document.getElementById('battBox').innerText = `BATTERY: ${batt}%`;
            document.getElementById('secBox').innerText = `SECURITY: ${Math.floor(Math.random()*5)}%_THREAT`;
        }
        setInterval(updateLiveStats, 2000);

        // 3. AI Brain (Groq API)
        async function fetchAI(text) {
            consoleLog.innerText = ">> UPLOADING_TO_GROQ_CLOUD...";
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${GROQ_KEY}` },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [
                            { role: "system", content: "You are JARVIS. Answer like a cool robotic assistant. Keep it under 20 words." },
                            { role: "user", content: text }
                        ]
                    })
                });
                const data = await response.json();
                if (data.choices) {
                    const reply = data.choices[0].message.content;
                    consoleLog.innerText = "JARVIS: " + reply;
                    speak(reply);
                } else {
                    throw new Error("Invalid Response");
                }
            } catch (e) {
                consoleLog.innerText = "!! ERROR: CHECK_API_KEY_OR_CONNECTION !!";
                console.error(e);
            }
        }

        // 4. Voice Recognition
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.onstart = () => { 
            core.style.borderColor = "#ff0055"; 
            coreText.innerText = "LISTENING";
            consoleLog.innerText = ">> MICROPHONE_ACTIVE..."; 
        };
        recognition.onresult = (e) => { 
            const input = e.results[0][0].transcript;
            consoleLog.innerText = "USER: " + input;
            fetchAI(input);
        };
        recognition.onend = () => { 
            core.style.borderColor = "#00f2ff"; 
            coreText.innerText = "AI_IDLE";
        };

        function startJarvis() { recognition.start(); }
    </script>
</body>
</html>
