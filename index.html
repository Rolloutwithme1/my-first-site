<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON COMMANDER: ULTIMATE EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        
        :root {
            --blue: #00f2ff;
            --pink: #ff00ea;
            --bg: #050505;
            --card: #121212;
            --green: #00ff88;
            --red: #ff4d4d;
            --fire: #ff6a00;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            border: 2px solid var(--blue);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
            width: 95%;
            max-width: 500px;
            text-align: center;
            position: relative;
        }

        .hidden { display: none !important; }

        /* Timer Bar */
        .timer-box {
            width: 100%;
            height: 10px;
            background: #222;
            border-radius: 10px;
            margin: 15px 0;
            overflow: hidden;
        }
        #timer-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(to right, var(--pink), var(--blue));
            transition: width 1s linear;
        }

        /* Level Cards */
        .level-card {
            background: #1e1e1e;
            margin: 10px 0;
            padding: 20px;
            border-radius: 12px;
            border-left: 6px solid #444;
            cursor: pointer;
            transition: 0.3s;
            opacity: 0.5;
        }
        .unlocked {
            opacity: 1;
            border-left-color: var(--pink);
            border-right: 1px solid var(--blue);
            transform: scale(1.02);
        }

        /* Sector Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .num-btn {
            padding: 15px 5px;
            background: #222;
            border: 1px solid var(--blue);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .num-btn.done {
            border-color: var(--pink);
            color: var(--pink);
            opacity: 0.4;
            pointer-events: none;
        }

        /* Rebus Style */
        .rebus-ui {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }
        .rebus-img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border: 2px solid var(--pink);
            border-radius: 10px;
        }
        .plus { font-size: 2rem; color: var(--blue); }

        /* Answers */
        .ans-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 20px 0;
        }
        .ans-btn {
            padding: 15px;
            background: #1a1a1a;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Orbitron';
        }
        .correct { background: var(--green) !important; color: black !important; }
        .wrong { background: var(--red) !important; }

        input {
            width: 80%;
            padding: 15px;
            background: #000;
            border: 2px solid var(--blue);
            color: white;
            text-align: center;
            border-radius: 10px;
            font-size: 1.1rem;
            font-family: 'Orbitron';
            margin-bottom: 15px;
        }

        .btn-main { background: var(--blue); color: black; padding: 12px 25px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-skip-lvl { background: var(--red); color: white; padding: 10px; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-family: 'Orbitron'; margin-top: 10px; }

        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-8px);} 75% {transform: translateX(8px);} }
    </style>
</head>
<body>

<div class="container" id="game-container">
    <div id="level-screen">
        <h1 style="color: var(--blue);">👾 NEON HUB</h1>
        <div id="btn-lvl1" class="level-card unlocked" onclick="startLvl(1)">LVL 1: GK QUIZ</div>
        <div id="btn-lvl2" class="level-card" onclick="startLvl(2)">LVL 2: JUMBLED</div>
        <div id="btn-lvl3" class="level-card" onclick="startLvl(3)">LVL 3: VISUAL REBUS</div>
        <div id="btn-lvl4" class="level-card" onclick="startLvl(4)">LVL 4: BOSS MODE</div>
    </div>

    <div id="grid-screen" class="hidden">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <button onclick="showHome()" style="color:var(--pink); background:none; border:none; cursor:pointer; font-size:1.5rem;">🔙</button>
            <h2 id="score-tracker">💎 0/6</h2>
        </div>
        <div class="grid" id="sector-grid"></div>
        <button class="btn-skip-lvl" onclick="forceUnlock()">⏩ SKIP FULL LEVEL & UNLOCK NEXT</button>
    </div>

    <div id="play-screen" class="hidden">
        <div class="timer-box"><div id="timer-fill"></div></div>
        <h3 id="q-text">Loading...</h3>
        <div id="game-area"></div>
        <div id="result-ui" class="hidden">
            <p id="feedback-text" style="font-size: 1.2rem; font-weight: bold;"></p>
            <button class="btn-main" onclick="backToGrid()">CONTINUE 🚀</button>
        </div>
    </div>
</div>

<script>
    let currentLvl = 1;
    let unlockedLvl = 1;
    let score = 0;
    let finishedSectors = [];
    let timerInterval;

    const gameData = {
        1: [ // GK
            { q: "Capital of India?", a: [{t:"Delhi", c:true}, {t:"Mumbai", c:false}] },
            { q: "Red Planet?", a: [{t:"Mars", c:true}, {t:"Venus", c:false}] },
            { q: "Sun is a...?", a: [{t:"Star", c:true}, {t:"Planet", c:false}] },
            { q: "H2O is...?", a: [{t:"Water", c:true}, {t:"Air", c:false}] },
            { q: "Largest Ocean?", a: [{t:"Pacific", c:true}, {t:"Indian", c:false}] },
            { q: "Human Bones?", a: [{t:"206", c:true}, {t:"210", c:false}] },
            { q: "King of Jungle?", a: [{t:"Lion", c:true}, {t:"Tiger", c:false}] },
            { q: "Fastest Bird?", a: [{t:"Falcon", c:true}, {t:"Eagle", c:false}] },
            { q: "Moon orbits...?", a: [{t:"Earth", c:true}, {t:"Sun", c:false}] },
            { q: "Primary Colors?", a: [{t:"3", c:true}, {t:"5", c:false}] }
        ],
        2: [ // Jumbled
            { q: "XOLBRO", ans: "ROBLOX" }, { q: "ZAPZI", ans: "PIZZA" }, { q: "SOTHG", ans: "GHOST" },
            { q: "EPACS", ans: "SPACE" }, { q: "LPAPE", ans: "APPLE" }, { q: "RITEG", ans: "TIGER" },
            { q: "ONEPH", ans: "PHONE" }, { q: "TEWRA", ans: "WATER" }, { q: "ECNAD", ans: "DANCE" },
            { q: "CISUM", ans: "MUSIC" }
        ],
        3: [ // Rebus (Image + Image)
            { i1: "https://images.unsplash.com/photo-1534274988757-a28bf1f53417?w=200", i2: "https://images.unsplash.com/photo-1590250059345-f09559670087?w=200", a: [{t:"RAINBOW", c:true}, {t:"SUNSET", c:false}] },
            { i1: "https://images.unsplash.com/photo-1511467687858-23d96c32e4ae?w=200", i2: "https://images.unsplash.com/photo-1587829741301-dc798b83bac1?w=200", a: [{t:"KEYBOARD", c:true}, {t:"PIANO", c:false}] },
            { i1: "https://images.unsplash.com/photo-1547721064-362036938502?w=200", i2: "https://images.unsplash.com/photo-1551028719-00167b16eac5?w=200", a: [{t:"PANCAKE", c:true}, {t:"BREAD", c:false}] },
            { i1: "https://images.unsplash.com/photo-1513542789411-b6a5d4f31634?w=200", i2: "https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=200", a: [{t:"FIREFLY", c:true}, {t:"DRAGONFLY", c:false}] },
            { i1: "https://images.unsplash.com/photo-1559136555-9303baea8ebd?w=200", i2: "https://images.unsplash.com/photo-1526336024174-e58f5cdd8e13?w=200", a: [{t:"BUTTERFLY", c:true}, {t:"MOTH", c:false}] },
            { i1: "https://images.unsplash.com/photo-1501747315-124a0eaca060?w=200", i2: "https://images.unsplash.com/photo-1517649763962-0c623066013b?w=200", a: [{t:"FOOTBALL", c:true}, {t:"BASKETBALL", c:false}] },
            { i1: "https://images.unsplash.com/photo-1495360010541-f48722b34f7d?w=200", i2: "https://images.unsplash.com/photo-1533738363-b7f9aef128ce?w=200", a: [{t:"CATWALK", c:true}, {t:"SIDEWALK", c:false}] },
            { i1: "https://images.unsplash.com/photo-1506466010722-395aa2bef877?w=200", i2: "https://images.unsplash.com/photo-1581092160562-40aa08e78837?w=200", a: [{t:"HARDWARE", c:true}, {t:"SOFTWARE", c:false}] },
            { i1: "https://images.unsplash.com/photo-1513151233558-d860c5398176?w=200", i2: "https://images.unsplash.com/photo-1542435503-956c469947f6?w=200", a: [{t:"PAPERWEIGHT", c:true}, {t:"BOOKEND", c:false}] },
            { i1: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Amelia_Earhart_1937.jpg/220px-Amelia_Earhart_1937.jpg", i2: "https://images.unsplash.com/photo-1610410761376-78716388481d?w=200", a: [{t:"AMELIA EARHART", c:true}, {t:"PILOT", c:false}] }
        ],
        4: [ // Boss GK (Fast)
            { q: "Is Fire hot?", a: [{t:"Yes", c:true}, {t:"No", c:false}] },
            { q: "Does Fish fly?", a: [{t:"No", c:true}, {t:"Yes", c:false}] },
            { q: "2 + 2 * 0?", a: [{t:"2", c:true}, {t:"0", c:false}] },
            { q: "Blue + Yellow?", a: [{t:"Green", c:true}, {t:"Red", c:false}] },
            { q: "Spider Legs?", a: [{t:"8", c:true}, {t:"6", c:false}] },
            { q: "Earth is round?", a: [{t:"True", c:true}, {t:"False", c:false}] },
            { q: "Icy water is?", a: [{t:"Cold", c:true}, {t:"Hot", c:false}] },
            { q: "Gravity pulls?", a: [{t:"Down", c:true}, {t:"Up", c:false}] },
            { q: "Final Boss?", a: [{t:"Me", c:true}, {t:"You", c:false}] },
            { q: "You Win?", a: [{t:"YES", c:true}, {t:"NO", c:false}] }
        ]
    };

    function startLvl(l) {
        if(l > unlockedLvl) return;
        currentLvl = l; score = 0; finishedSectors = [];
        document.getElementById('level-screen').classList.add('hidden');
        document.getElementById('grid-screen').classList.remove('hidden');
        updateGrid();
    }

    function updateGrid() {
        const grid = document.getElementById('sector-grid');
        grid.innerHTML = '';
        document.getElementById('score-tracker').innerText = `💎 ${score}/6`;
        for(let i=0; i<10; i++) {
            const btn = document.createElement('button');
            btn.className = finishedSectors.includes(i) ? 'num-btn done' : 'num-btn';
            btn.innerText = `S-${i+1}`;
            btn.onclick = () => loadQ(i);
            grid.appendChild(btn);
        }
    }

    function loadQ(idx) {
        document.getElementById('grid-screen').classList.add('hidden');
        document.getElementById('play-screen').classList.remove('hidden');
        document.getElementById('result-ui').classList.add('hidden');
        
        const area = document.getElementById('game-area');
        area.innerHTML = '';
        const qData = gameData[currentLvl][idx];

        if(currentLvl === 3) {
            document.getElementById('q-text').innerText = "Combine the concepts:";
            area.innerHTML = `
                <div class="rebus-ui">
                    <img src="${qData.i1}" class="rebus-img">
                    <div class="plus">+</div>
                    <img src="${qData.i2}" class="rebus-img">
                </div>
            `;
        } else {
            document.getElementById('q-text').innerText = qData.q;
        }

        if(qData.a) {
            // SHUFFLE LOGIC
            const shuffled = [...qData.a].sort(() => Math.random() - 0.5);
            const g = document.createElement('div'); g.className = 'ans-grid';
            shuffled.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'ans-btn';
                b.innerText = opt.t;
                b.onclick = () => check(opt.c, b, idx);
                g.appendChild(b);
            });
            area.appendChild(g);
        } else {
            const inp = document.createElement('input'); inp.id = "user-inp";
            inp.placeholder = "TYPE ANSWER...";
            const b = document.createElement('button'); b.className = "btn-main";
            b.innerText = "SUBMIT";
            b.onclick = () => check(inp.value.toUpperCase().trim() === qData.ans, null, idx);
            area.appendChild(inp); area.appendChild(b);
        }
        startTimer();
    }

    function startTimer() {
        let t = (currentLvl === 4) ? 5 : 12;
        const fill = document.getElementById('timer-fill');
        fill.style.width = '100%';
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            t--;
            fill.style.width = (t / (currentLvl === 4 ? 5 : 12) * 100) + '%';
            if(t <= 0) { clearInterval(timerInterval); check(false, null, -1); }
        }, 1000);
    }

    function check(correct, btn, idx) {
        clearInterval(timerInterval);
        if(idx !== -1) finishedSectors.push(idx);
        
        if(correct) {
            if(btn) btn.classList.add('correct');
            score++;
        } else {
            if(btn) btn.classList.add('wrong');
            document.getElementById('game-container').classList.add('shake');
            setTimeout(() => document.getElementById('game-container').classList.remove('shake'), 400);
        }

        document.getElementById('result-ui').classList.remove('hidden');
        document.getElementById('feedback-text').innerText = correct ? "SUCCESS! ✨" : "MISS! ❌";
        document.getElementById('feedback-text').style.color = correct ? 'var(--green)' : 'var(--red)';

        if(score >= 6) {
            unlockedLvl = Math.max(unlockedLvl, currentLvl + 1);
            document.getElementById(`btn-lvl${unlockedLvl}`).classList.add('unlocked');
        }
    }

    function forceUnlock() {
        unlockedLvl = Math.min(4, currentLvl + 1);
        for(let i=1; i<=4; i++) {
            if(i <= unlockedLvl) document.getElementById(`btn-lvl${i}`).classList.add('unlocked');
        }
        alert("LEVEL SKIPPED! Next stage unlocked.");
        showHome();
    }

    function backToGrid() {
        if(score >= 6) showHome();
        else if(finishedSectors.length === 10) { alert("Sectors exhausted! Restarting grid."); startLvl(currentLvl); }
        else {
            document.getElementById('grid-screen').classList.remove('hidden');
            document.getElementById('play-screen').classList.add('hidden');
            updateGrid();
        }
    }

    function showHome() {
        document.getElementById('level-screen').classList.remove('hidden');
        document.getElementById('grid-screen').classList.add('hidden');
        document.getElementById('play-screen').classList.add('hidden');
    }
</script>
</body>
</html>
