<!DOCTYPE html>
<html>
<head>
    <title>CRITICAL_OVERLOAD | Rolloutwithme1</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        
        .alert-box {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 0, 0, 0.1); border: 2px solid #ff0000;
            padding: 40px; color: #ff0000; text-align: center;
            box-shadow: 0 0 50px rgba(255,0,0,0.5); pointer-events: auto;
            backdrop-filter: blur(10px); z-index: 10;
        }
        
        .glitch-text { font-size: 24px; font-weight: bold; text-transform: uppercase; animation: shake 0.1s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -2px); }
            100% { transform: translate(1px, 1px); }
        }

        .input-line { background: transparent; border: 1px solid #ff0000; color: #ff0000; padding: 10px; width: 100%; margin-top: 20px; outline: none; }
        button { background: #ff0000; color: #000; border: none; padding: 10px 30px; margin-top: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="alert-box">
        <div class="glitch-text">!! SYSTEM CRITICAL !!</div>
        <p>UNAUTHORIZED ACCESS DETECTED</p>
        <form action="https://formspree.io/f/mjgakbzq" method="POST">
            <input type="text" name="bypass" class="input-line" placeholder="ENTER BYPASS CODE" required><br>
            <button type="submit">EMERGENCY UPLOAD</button>
        </form>
    </div>

    <canvas id="glitchCanvas"></canvas>

    <script>
        const canvas = document.getElementById('glitchCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$#@%&*";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];

        for (let i = 0; i < columns; i++) drops[i] = 1;

        function draw() {
            // Fade effect for trails
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Randomly switch between Green and Red for a "glitch" look
            ctx.fillStyle = Math.random() > 0.95 ? "#ff0000" : "#00ff00";
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(draw, 33);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
