<!DOCTYPE html>
<html>
<head>
    <title>JARVIS_MISSION_CONTROL</title>
    <style>
        body { margin: 0; background: #000; color: #00f2ff; font-family: 'Courier New', monospace; overflow: hidden; display: flex; height: 100vh; }
        
        /* Sidebar for Stats */
        .sidebar { width: 250px; border-right: 1px solid #00f2ff33; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; background: rgba(0, 20, 30, 0.5); }
        .stat-box { margin-bottom: 20px; border: 1px solid #00f2ff; padding: 10px; font-size: 12px; }
        .glitch-red { color: #ff0055; text-shadow: 0 0 5px #ff0055; }

        /* Main Center Area */
        .main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .core-visual { width: 220px; height: 220px; border: 2px solid #00f2ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px #00f2ff22; position: relative; }
        .ring-anim { position: absolute; width: 100%; height: 100%; border: 1px dashed #00f2ff; border-radius: 50%; animation: spin 10s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #console { margin-top: 30px; width: 80%; background: rgba(0,0,0,0.8); border: 1px solid #00f2ff; padding: 15px; min-height: 100px; font-size: 14px; overflow-y: auto; }
        
        .btn-activate { background: #00f2ff; color: #000; border: none; padding: 15px 40px; font-weight: bold; cursor: pointer; margin-top: 20px; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div>
            <h3>> SENSORS</h3>
            <div class="stat-box">MOTOR_TEMP: 42°C</div>
            <div class="stat-box">BATTERY: 88%</div>
            <div class="stat-box">GPS: 40.7128° N</div>
        </div>
        <div>
            <div class="stat-box glitch-red">SECURITY: BREACH_SCAN_0%</div>
            <small>ID: ROLLOUT_WITH_ME_1</small>
        </div>
    </div>

    <div class="main">
        <div class="core-visual" id="core">
            <div class="ring-anim"></div>
            <span>AI_ACTIVE</span>
        </div>

        <div id="console">>> TERMINAL_READY: AWAITING_INPUT...</div>
        
        <button class="btn-activate" onclick="startJarvis()">[ INITIALIZE_VOICE ]</button>
    </div>

    <script>
        const GROQ_KEY = "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";
        const consoleLog = document.getElementById('console');
        const core = document.getElementById('core');

        function speak(text) {
            const utter = new SpeechSynthesisUtterance(text);
            utter.pitch = 0.7;
            window.speechSynthesis.speak(utter);
        }

        async function fetchAI(text) {
            consoleLog.innerText = ">> PROCESSING_NEURAL_PATH...";
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${GROQ_KEY}` },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{ role: "system", content: "You are JARVIS. Answer like a robotic assistant." }, { role: "user", content: text }]
                    })
                });
                const data = await response.json();
                const reply = data.choices[0].message.content;
                consoleLog.innerText = "JARVIS: " + reply;
                speak(reply);
            } catch (e) { consoleLog.innerText = "!! ERROR: BRAIN_LINK_FAILED !!"; }
        }

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.onstart = () => { core.style.borderColor = "#ff0055"; consoleLog.innerText = "LISTENING..."; };
        recognition.onresult = (e) => { 
            const input = e.results[0][0].transcript;
            consoleLog.innerText = "USER: " + input;
            fetchAI(input);
        };
        recognition.onend = () => { core.style.borderColor = "#00f2ff"; };

        function startJarvis() { recognition.start(); }
    </script>
</body>
</html>
