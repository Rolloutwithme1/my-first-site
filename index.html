<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EYE_OF_THE_MACHINE | Rolloutwithme1</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; }
        
        .eye-container { position: relative; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, #222, #000); border: 4px solid #00f2ff; box-shadow: 0 0 50px #00f2ff55; }
        
        .pupil { position: absolute; width: 80px; height: 80px; background: #00f2ff; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 30px #00f2ff, inset 0 0 20px #ffffff; }

        .iris { position: absolute; width: 150px; height: 150px; border: 2px dashed #00f2ff; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: spin 10s linear infinite; }

        @keyframes spin { 100% { transform: translate(-50%, -50%) rotate(360deg); } }

        .hud-text { position: absolute; color: #00f2ff; font-size: 12px; width: 100%; text-align: center; bottom: -60px; text-shadow: 0 0 5px #00f2ff; }

        .form-overlay { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.8); border: 1px solid #00f2ff; padding: 15px; border-radius: 5px; color: #00f2ff; }
        input { background: #111; border: 1px solid #00f2ff; color: #00f2ff; width: 150px; padding: 5px; margin-bottom: 10px; }
        button { background: #00f2ff; color: #000; border: none; padding: 8px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="form-overlay">
        <form action="https://formspree.io/f/mjgakbzq" method="POST">
            <input type="text" name="id" placeholder="LINK_USER" required><br>
            <button type="submit">STABILIZE_EYE</button>
        </form>
    </div>

    <div class="eye-container">
        <div class="iris"></div>
        <div class="pupil" id="pupil"></div>
        <div class="hud-text">
            TARGET_ACQUIRED: <span id="coords">X:0 Y:0</span><br>
            SYSTEM_STATUS: SCANNING...
        </div>
    </div>

    <script>
        const pupil = document.getElementById('pupil');
        const coords = document.getElementById('coords');

        document.addEventListener('mousemove', (e) => {
            // Get eye center
            const x = window.innerWidth / 2;
            const y = window.innerHeight / 2;

            // Calculate angle between mouse and eye center
            const rad = Math.atan2(e.pageX - x, e.pageY - y);
            const rot = (rad * (180 / Math.PI) * -1) + 180;

            // Move the pupil slightly toward the mouse (Trigonometry)
            const distance = 40; // Max move distance
            const moveX = Math.sin(rad) * distance;
            const moveY = Math.cos(rad) * distance;

            pupil.style.transform = `translate(calc(-50% + ${moveX}px), calc(-50% + ${moveY}px))`;
            coords.innerText = `X:${e.pageX} Y:${e.pageY}`;
        });
    </script>
</body>
</html>
