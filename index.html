<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON COMMANDER: FINAL EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        :root { --blue: #00f2ff; --pink: #ff00ea; --bg: #050505; --card: #121212; --green: #00ff88; --red: #ff4d4d; }
        body { font-family: 'Orbitron', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .container { background: var(--card); padding: 25px; border-radius: 20px; border: 2px solid var(--blue); width: 95%; max-width: 500px; text-align: center; position: relative; box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }
        .hidden { display: none !important; }
        .timer-box { width: 100%; height: 10px; background: #222; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        #timer-fill { height: 100%; width: 100%; background: linear-gradient(to right, var(--pink), var(--blue)); transition: width 1s linear; }
        .level-card { background: #1e1e1e; margin: 10px 0; padding: 20px; border-radius: 12px; border-left: 6px solid #444; cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .unlocked { opacity: 1; border-left-color: var(--pink); border-right: 1px solid var(--blue); }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 20px 0; }
        .num-btn { padding: 15px 5px; background: #222; border: 1px solid var(--blue); color: white; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .num-btn.done { border-color: var(--pink); color: var(--pink); opacity: 0.4; pointer-events: none; }
        .rebus-ui { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 15px 0; }
        .rebus-img { width: 110px; height: 110px; object-fit: contain; border: 2px solid var(--pink); border-radius: 12px; background: white; }
        .ans-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .ans-btn { padding: 15px; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 8px; cursor: pointer; font-family: 'Orbitron'; transition: 0.2s; }
        .ans-btn:hover { border-color: var(--blue); }
        .correct { background: var(--green) !important; color: black !important; }
        .wrong { background: var(--red) !important; }
        .btn-main { background: var(--blue); color: black; padding: 12px 25px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; }
        .btn-skip-lvl { background: #222; color: #666; padding: 10px; border: 1px solid #333; border-radius: 8px; width: 100%; cursor: pointer; font-family: 'Orbitron'; margin-top: 10px; font-size: 0.7rem; }
        #summary-screen h2 { color: var(--green); text-shadow: 0 0 10px var(--green); }
    </style>
</head>
<body>

<div class="container">
    <div id="level-screen">
        <h1 style="color: var(--blue); letter-spacing: 2px;">NEON COMMANDER</h1>
        <div id="btn-lvl1" class="level-card unlocked" onclick="startLvl(1)">LVL 1: GK QUIZ</div>
        <div id="btn-lvl2" class="level-card" onclick="startLvl(2)">LVL 2: JUMBLED</div>
        <div id="btn-lvl3" class="level-card" onclick="startLvl(3)">LVL 3: STABLE REBUS</div>
        <div id="btn-lvl4" class="level-card" onclick="startLvl(4)">LVL 4: BOSS MATH 🔥</div>
    </div>

    <div id="grid-screen" class="hidden">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <button onclick="showHome()" style="color:var(--pink); background:none; border:none; cursor:pointer; font-size: 1.5rem;">🏠</button>
            <h2 id="score-tracker" style="color: var(--blue);">💎 0/7</h2>
        </div>
        <p style="font-size: 0.8rem; color: #888;">Complete all 10 sectors to finish level</p>
        <div class="grid" id="sector-grid"></div>
        <button class="btn-skip-lvl" onclick="forceSkip()">⏩ SKIP LEVEL (NO SUMMARY)</button>
    </div>

    <div id="play-screen" class="hidden">
        <div class="timer-box"><div id="timer-fill"></div></div>
        <h3 id="q-text" style="min-height: 50px;"></h3>
        <div id="game-area"></div>
        <div id="result-ui" class="hidden">
            <p id="feedback-text" style="font-size: 1.2rem; font-weight: bold;"></p>
            <button class="btn-main" id="continue-btn">NEXT SECTOR</button>
        </div>
    </div>

    <div id="summary-screen" class="hidden">
        <h2>LEVEL COMPLETE!</h2>
        <p id="summary-msg" style="font-size: 1.3rem; margin: 30px 0; color: white; line-height: 1.6;"></p>
        <button class="btn-main" onclick="showHome()">RETURN TO HUB</button>
    </div>
</div>

<script>
    let currentLvl = 1, unlockedLvl = 1, score = 0, finishedSectors = [], timerInterval;

    const gameData = {
        1: Array(10).fill({ q: "Is water wet?", a: [{t:"Yes", c:true}, {t:"No", c:false}] }),
        2: [ { q: "XOLBRO", ans: "ROBLOX" }, { q: "ZAPZI", ans: "PIZZA" }, { q: "SOTHG", ans: "GHOST" }, { q: "EPACS", ans: "SPACE" }, { q: "LPAPE", ans: "APPLE" }, { q: "RITEG", ans: "TIGER" }, { q: "ONEPH", ans: "PHONE" }, { q: "TEWRA", ans: "WATER" }, { q: "ECNAD", ans: "DANCE" }, { q: "CISUM", ans: "MUSIC" } ],
        3: [ 
            { i1: "https://img.icons8.com/color/144/rain.png", i2: "https://img.icons8.com/color/144/bow.png", ans: "RAINBOW", opts: ["RAINBOW", "SUNSET"] },
            { i1: "https://img.icons8.com/color/144/key.png", i2: "https://img.icons8.com/color/144/keyboard.png", ans: "KEYBOARD", opts: ["KEYBOARD", "PIANO"] },
            { i1: "https://img.icons8.com/color/144/foot.png", i2: "https://img.icons8.com/color/144/football.png", ans: "FOOTBALL", opts: ["FOOTBALL", "SOCCER"] },
            { i1: "https://img.icons8.com/color/144/frying-pan.png", i2: "https://img.icons8.com/color/144/cake.png", ans: "PANCAKE", opts: ["PANCAKE", "WAFFLE"] },
            { i1: "https://img.icons8.com/color/144/fire.png", i2: "https://img.icons8.com/color/144/fly.png", ans: "FIREFLY", opts: ["FIREFLY", "LIGHTBULB"] },
            { i1: "https://img.icons8.com/color/144/tooth.png", i2: "https://img.icons8.com/color/144/toothpaste.png", ans: "TOOTHPASTE", opts: ["TOOTHPASTE", "DENTIST"] },
            { i1: "https://img.icons8.com/color/144/sun.png", i2: "https://img.icons8.com/color/144/flower.png", ans: "SUNFLOWER", opts: ["SUNFLOWER", "GARDEN"] },
            { i1: "https://img.icons8.com/color/144/cat.png", i2: "https://img.icons8.com/color/144/walking.png", ans: "CATWALK", opts: ["CATWALK", "SIDEWALK"] },
            { i1: "https://img.icons8.com/color/144/snow.png", i2: "https://img.icons8.com/color/144/man.png", ans: "SNOWMAN", opts: ["SNOWMAN", "ICE"] },
            { i1: "https://img.icons8.com/color/144/ear.png", i2: "https://img.icons8.com/color/144/diamond-ring.png", ans: "EARRING", opts: ["EARRING", "NECKLACE"] }
        ],
        4: [ 
            { q: "12 + 15", a: [{t:"27", c:true}, {t:"25", c:false}] }, 
            { q: "8 x 7", a: [{t:"56", c:true}, {t:"54", c:false}] }, 
            { q: "100 - 37", a: [{t:"63", c:true}, {t:"73", c:false}] }, 
            { q: "9 x 9", a: [{t:"81", c:true}, {t:"72", c:false}] }, 
            { q: "(10 x 2) + 5", a: [{t:"25", c:true}, {t:"30", c:false}] }, 
            { q: "14 + 19", a: [{t:"33", c:true}, {t:"31", c:false}] }, 
            { q: "6 x 12", a: [{t:"72", c:true}, {t:"62", c:false}] }, 
            { q: "150 - 75", a: [{t:"75", c:true}, {t:"85", c:false}] }, 
            { q: "25 x 4", a: [{t:"100", c:true}, {t:"125", c:false}] }, 
            { q: "64 / 8", a: [{t:"8", c:true}, {t:"6", c:false}] } 
        ]
    };

    function startLvl(l) { 
        if(l > unlockedLvl) return; 
        currentLvl = l; score = 0; finishedSectors = []; 
        document.getElementById('level-screen').classList.add('hidden'); 
        document.getElementById('grid-screen').classList.remove('hidden'); 
        document.getElementById('summary-screen').classList.add('hidden'); 
        updateGrid(); 
    }

    function updateGrid() {
        const grid = document.getElementById('sector-grid'); grid.innerHTML = '';
        document.getElementById('score-tracker').innerText = `💎 ${score}/7`;
        for(let i=0; i<10; i++) {
            const btn = document.createElement('button'); 
            btn.className = finishedSectors.includes(i) ? 'num-btn done' : 'num-btn';
            btn.innerText = `S-${i+1}`; 
            btn.onclick = () => loadQ(i); 
            grid.appendChild(btn);
        }
    }

    function loadQ(idx) {
        document.getElementById('grid-screen').classList.add('hidden');
        document.getElementById('play-screen').classList.remove('hidden');
        document.getElementById('result-ui').classList.add('hidden');
        const area = document.getElementById('game-area'), qData = gameData[currentLvl][idx % 10];
        area.innerHTML = '';

        if(currentLvl === 3) {
            document.getElementById('q-text').innerText = "COMBINE THE IMAGES:";
            area.innerHTML = `<div class="rebus-ui"><img src="${qData.i1}" class="rebus-img"> <div style="font-size:2rem; color:var(--blue)">+</div> <img src="${qData.i2}" class="rebus-img"></div>`;
            const g = document.createElement('div'); g.className = 'ans-grid';
            [...qData.opts].sort(() => Math.random() - 0.5).forEach(t => {
                const b = document.createElement('button'); b.className = 'ans-btn'; b.innerText = t; b.onclick = () => check(t === qData.ans, b, idx); g.appendChild(b);
            });
            area.appendChild(g);
        } else {
            document.getElementById('q-text').innerText = (currentLvl === 4) ? `MATH CHALLENGE: ${qData.q}` : qData.q;
            const g = document.createElement('div'); g.className = 'ans-grid';
            const choices = qData.a ? qData.a : [{t:qData.ans, c:true}, {t:"WRONG", c:false}];
            [...choices].sort(() => Math.random() - 0.5).forEach(opt => {
                const b = document.createElement('button'); b.className = 'ans-btn'; b.innerText = opt.t; b.onclick = () => check(opt.c, b, idx); g.appendChild(b);
            });
            area.appendChild(g);
        }
        startTimer();
    }

    function startTimer() {
        let maxTime = (currentLvl === 4) ? 5 : 12;
        let t = maxTime;
        const fill = document.getElementById('timer-fill'); fill.style.width = '100%';
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            t--; fill.style.width = (t / maxTime * 100) + '%';
            if(t <= 0) { clearInterval(timerInterval); check(false, null, -1); }
        }, 1000);
    }

    function check(correct, btn, idx) {
        clearInterval(timerInterval); 
        if(idx !== -1 && !finishedSectors.includes(idx)) finishedSectors.push(idx);
        if(correct) { if(btn) btn.classList.add('correct'); score++; } 
        else { if(btn) btn.classList.add('wrong'); }
        
        document.getElementById('result-ui').classList.remove('hidden');
        document.getElementById('feedback-text').innerText = correct ? "SYSTEM MATCHED! ✨" : "ERROR DETECTED! ❌";
        document.getElementById('feedback-text').style.color = correct ? "var(--green)" : "var(--red)";
        
        // If all 10 are done, change button to "FINISH LEVEL"
        if(finishedSectors.length === 10) {
            document.getElementById('continue-btn').innerText = "CALCULATE RESULTS";
            document.getElementById('continue-btn').onclick = finishLevel;
        } else {
            document.getElementById('continue-btn').innerText = "NEXT SECTOR";
            document.getElementById('continue-btn').onclick = backToGrid;
        }
    }

    function finishLevel() {
        document.getElementById('play-screen').classList.add('hidden');
        document.getElementById('summary-screen').classList.remove('hidden');
        
        if(score >= 7) { 
            unlockedLvl = Math.max(unlockedLvl, currentLvl + 1);
            document.getElementById('summary-msg').innerText = `Good Job! Only took ${score} points. Next level unlocked!`;
        } else if (score >= 4) {
             unlockedLvl = Math.max(unlockedLvl, currentLvl + 1);
             document.getElementById('summary-msg').innerText = `Level cleared with ${score} points. But no 'Good Job' bonus (Need 7).`;
        } else {
            document.getElementById('summary-msg').innerText = `Access Denied! You only got ${score} points. You need at least 4 to pass.`;
        }
    }

    function forceSkip() {
        unlockedLvl = Math.min(4, currentLvl + 1);
        showHome(); // Skips summary screen as requested
    }

    function backToGrid() { 
        document.getElementById('grid-screen').classList.remove('hidden'); 
        document.getElementById('play-screen').classList.add('hidden'); 
        updateGrid(); 
    }
    
    function showHome() {
        document.getElementById('level-screen').classList.remove('hidden');
        document.getElementById('grid-screen').classList.add('hidden');
        document.getElementById('summary-screen').classList.add('hidden');
        document.querySelectorAll('.level-card').forEach((c,i)=> i < unlockedLvl ? c.classList.add('unlocked') : null);
    }
</script>
</body>
</html>
