<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamer's Hub 🎮</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-pink: #ff007f;
            --bg: #0d0d12;
            --card: #1c1c2b;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 20px var(--neon-blue);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        .hidden { display: none; }

        /* Mode Selection Buttons */
        .mode-btn {
            background: transparent;
            color: var(--neon-blue);
            border: 2px solid var(--neon-blue);
            padding: 20px;
            margin: 10px;
            width: 80%;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.3s;
        }

        .mode-btn:hover {
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        /* Game Elements */
        .q-img {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid #444;
        }

        .ans-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        
        button.ans-btn {
            padding: 15px;
            background: #2a2a3d;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        .correct { background: #00ff88 !important; color: black !important; }
        .wrong { background: #ff4d4d !important; color: white !important; }

        input {
            width: 80%;
            padding: 12px;
            background: transparent;
            border: 2px solid var(--neon-pink);
            color: white;
            text-align: center;
            font-size: 1.5rem;
            border-radius: 10px;
        }

        .scrambled { font-size: 2rem; color: var(--neon-pink); letter-spacing: 5px; margin: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div id="menu-screen">
        <h1>SELECT YOUR MISSION 🚀</h1>
        <button class="mode-btn" onclick="startMode('quiz')">🧠 GK QUIZ</button>
        <button class="mode-btn" onclick="startMode('jumble')">🔠 JUMBLE WORD</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="score-display">Score: 0</div>
        <img id="quiz-image" src="" class="q-img">
        <h2 id="quiz-question">Question?</h2>
        <div id="quiz-options" class="ans-grid"></div>
    </div>

    <div id="jumble-screen" class="hidden">
        <div class="emoji" id="jumble-emoji" style="font-size: 3rem;"></div>
        <div id="jumble-text" class="scrambled">WORD</div>
        <input type="text" id="jumble-input" placeholder="Type answer...">
        <p id="jumble-msg"></p>
    </div>

    <div id="end-screen" class="hidden">
        <h1>GAME OVER!</h1>
        <h2 id="final-score">Score: 0</h2>
        <button class="mode-btn" onclick="location.reload()">MAIN MENU</button>
    </div>
</div>

<script>
    let currentIdx = 0;
    let score = 0;
    let activeMode = '';

    // --- GAME DATA ---
    const quizData = [
        {
            q: "Which company made this console?",
            img: "https://images.unsplash.com/photo-1605902711622-cfb43c4437b5?w=400", // Image URL
            a: [{t:"Sony", c:false}, {t:"Microsoft", c:true}, {t:"Nintendo", c:false}, {t:"Sega", c:false}]
        },
        {
            q: "What is the capital of Japan?",
            img: "https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?w=400",
            a: [{t:"Seoul", c:false}, {t:"Beijing", c:false}, {t:"Tokyo", c:true}, {t:"Bangkok", c:false}]
        }
    ];

    const jumbleData = [
        { correct: "ORANGE", jumbled: "GNERAO", emoji: "🍊" },
        { correct: "LAPTOP", jumbled: "PPOLAT", emoji: "💻" }
    ];

    function startMode(mode) {
        activeMode = mode;
        document.getElementById('menu-screen').classList.add('hidden');
        if(mode === 'quiz') {
            document.getElementById('quiz-screen').classList.remove('hidden');
            loadQuiz();
        } else {
            document.getElementById('jumble-screen').classList.remove('hidden');
            loadJumble();
        }
    }

    // --- QUIZ LOGIC ---
    function loadQuiz() {
        if(currentIdx >= quizData.length) return showEnd();
        const data = quizData[currentIdx];
        document.getElementById('quiz-question').innerText = data.q;
        document.getElementById('quiz-image').src = data.img;
        const options = document.getElementById('quiz-options');
        options.innerHTML = '';
        
        data.a.forEach(ans => {
            const btn = document.createElement('button');
            btn.className = 'ans-btn';
            btn.innerText = ans.t;
            btn.onclick = () => {
                if(ans.c) {
                    btn.classList.add('correct');
                    score += 10;
                } else {
                    btn.classList.add('wrong');
                    // Show correct one
                }
                document.getElementById('score-display').innerText = `Score: ${score}`;
                disableBtns('.ans-btn');
                setTimeout(() => { currentIdx++; loadQuiz(); }, 2000);
            };
            options.appendChild(btn);
        });
    }

    // --- JUMBLE LOGIC ---
    function loadJumble() {
        if(currentIdx >= jumbleData.length) return showEnd();
        const data = jumbleData[currentIdx];
        document.getElementById('jumble-text').innerText = data.jumbled;
        document.getElementById('jumble-emoji').innerText = data.emoji;
        document.getElementById('jumble-input').value = '';
        document.getElementById('jumble-msg').innerText = '';
    }

    document.getElementById('jumble-input').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') {
            const val = e.target.value.toUpperCase();
            if(val === jumbleData[currentIdx].correct) {
                score += 10;
                document.getElementById('jumble-msg').innerText = "✅ CORRECT!";
            } else {
                document.getElementById('jumble-msg').innerText = "❌ WRONG! Answer was: " + jumbleData[currentIdx].correct;
            }
            setTimeout(() => { currentIdx++; loadJumble(); }, 2000);
        }
    });

    function disableBtns(selector) {
        document.querySelectorAll(selector).forEach(b => b.disabled = true);
    }

    function showEnd() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('jumble-screen').classList.add('hidden');
        document.getElementById('end-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = `Score: ${score}`;
    }
</script>
</body>
</html>
