<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friendship Quiz | Rolloutwithme1</title>
    <style>
        body { 
            background-color: #fff0f6; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; 
        }
        .card {
            background: white; padding: 40px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 400px;
            text-align: center;
        }
        h1 { color: #d63384; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 25px; }
        
        label { display: block; text-align: left; margin-top: 15px; color: #444; font-weight: bold; }
        
        input, textarea { 
            width: 100%; padding: 12px; margin-top: 5px; 
            border: 2px solid #ffe0ed; border-radius: 10px; 
            box-sizing: border-box; outline: none; transition: border-color 0.3s;
        }
        input:focus, textarea:focus { border-color: #d63384; }

        button {
            background-color: #d63384; color: white; border: none;
            width: 100%; padding: 15px; margin-top: 25px;
            border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
        }
        button:hover { background-color: #a32a61; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="card">
        <h1>Friendship Test! 🌸</h1>
        <p>Fill this out and it will be sent directly to me.</p>

        <form action="https://formspree.io/f/mjgakbzq" method="POST">
            
            <label>Your Name:</label>
            <input type="text" name="name" placeholder="Enter your name" required>

            <label>What makes us good friends?</label>
            <textarea name="answer" rows="4" placeholder="Type your answer here..." required></textarea>

            <button type="submit">Send to Rolloutwithme1</button>
        </form>
    </div>

</body>
</html>
