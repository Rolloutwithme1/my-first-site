<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA GAMER HUB 🚀</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        :root { --blue: #00f2ff; --pink: #ff00ea; --bg: #050505; --card: #121212; --green: #00ff88; --red: #ff4d4d; }
        body { font-family: 'Orbitron', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 25px; border-radius: 20px; border: 2px solid var(--blue); box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); width: 95%; max-width: 500px; text-align: center; }
        .hidden { display: none !important; }
        
        /* Level & Grid Styles */
        .level-card { background: #1e1e1e; margin: 10px 0; padding: 15px; border-radius: 10px; border-left: 5px solid var(--pink); cursor: pointer; transition: 0.3s; position: relative; }
        .locked { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 20px 0; }
        .num-btn { padding: 10px; background: #333; border: 1px solid var(--blue); color: white; border-radius: 5px; cursor: pointer; }
        .num-btn.done { background: var(--blue); color: black; }
        .num-btn:disabled { opacity: 0.5; cursor: default; }

        /* Game Elements */
        .ans-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .ans-btn { padding: 12px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; cursor: pointer; }
        .correct { background: var(--green) !important; color: black !important; font-weight: bold; }
        .wrong { background: var(--red) !important; color: white !important; }
        
        input { width: 80%; padding: 12px; background: #000; border: 2px solid var(--blue); color: white; text-align: center; border-radius: 10px; font-family: 'Orbitron'; }
        .btn-main { background: var(--blue); color: black; padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* Animations */
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-10px);} 75% {transform: translateX(10px);} }
    </style>
</head>
<body>

<div class="container" id="main-box">
    <div id="level-screen">
        <h1 style="color: var(--blue)">GAMER MISSIONS</h1>
        <div class="level-card" onclick="startLevel(1)">LEVEL 1: GK QUIZ 🧠 <span id="l1-status"></span></div>
        <div class="level-card locked" id="lv2" onclick="startLevel(2)">LEVEL 2: JUMBLE 🔠 <span id="l2-status">🔒</span></div>
        <div class="level-card locked" id="lv3" onclick="startLevel(3)">LEVEL 3: MATH RUSH 🔢 <span id="l3-status">🔒</span></div>
        <div class="level-card locked" id="lv4" onclick="startLevel(4)">LEVEL 4: BOSS MODE 🔥 <span id="l4-status">🔒</span></div>
    </div>

    <div id="grid-screen" class="hidden">
        <button onclick="showLevels()" style="float:left; background:none; border:none; color:var(--pink); cursor:pointer;">← BACK</button>
        <h2 id="mode-title">SELECT QUESTION</h2>
        <div class="grid" id="number-grid"></div>
        <p id="progress-text">Score 7 to unlock next level!</p>
    </div>

    <div id="play-screen" class="hidden">
        <h3 id="question-display">Question?</h3>
        <div id="game-area"></div>
        <div id="feedback-area" class="hidden">
            <p id="feedback-text"></p>
            <button class="btn-main" onclick="backToGrid()">CONTINUE</button>
        </div>
    </div>
</div>

<script>
    let unlocked = 1;
    let currentLevel = 0;
    let currentScore = 0;
    let completedInLvl = [];
    const winSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3');
    const loseSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3');

    // Questions Data (10 per Level)
    const levelData = {
        1: [ // GK Quiz
            { q: "Capital of India?", a: [{t:"Mumbai", c:false}, {t:"Delhi", c:true}, {t:"Goa", c:false}, {t:"Pune", c:false}] },
            { q: "Biggest Planet?", a: [{t:"Mars", c:false}, {t:"Jupiter", c:true}, {t:"Earth", c:false}, {t:"Venus", c:false}] },
            { q: "Who made iPhone?", a: [{t:"Apple", c:true}, {t:"Sony", c:false}, {t:"Nokia", c:false}, {t:"Google", c:false}] },
            { q: "7 + 3?", a: [{t:"10", c:true}, {t:"9", c:false}, {t:"11", c:false}, {t:"21", c:false}] },
            { q: "Water H2O?", a: [{t:"Yes", c:true}, {t:"No", c:false}] },
            { q: "Color of Grass?", a: [{t:"Blue", c:false}, {t:"Green", c:true}, {t:"Red", c:false}, {t:"Yellow", c:false}] },
            { q: "King of Jungle?", a: [{t:"Tiger", c:false}, {t:"Lion", c:true}, {t:"Elephant", c:false}, {t:"Bear", c:false}] },
            { q: "Human Bones?", a: [{t:"206", c:true}, {t:"100", c:false}, {t:"300", c:false}, {t:"50", c:false}] },
            { q: "Fastest Bird?", a: [{t:"Ostrich", c:false}, {t:"Falcon", c:true}, {t:"Eagle", c:false}, {t:"Crow", c:false}] },
            { q: "Coldest Place?", a: [{t:"Sahara", c:false}, {t:"Antarctica", c:true}, {t:"India", c:false}, {t:"Brazil", c:false}] }
        ],
        2: [ // Jumble
            { c: "DOG", j: "GDO" }, { c: "CAT", j: "ATC" }, { c: "GAME", j: "EMAG" }, { c: "FISH", j: "HIFS" }, { c: "BIRD", j: "DRBI" },
            { c: "MOON", j: "NOMO" }, { c: "STAR", j: "RAST" }, { c: "FIRE", j: "RIFE" }, { c: "WATER", j: "TEWRA" }, { c: "KING", j: "GNIK" }
        ],
        3: [ // Math
            { q: "12 + 8", ans: "20" }, { q: "5 * 5", ans: "25" }, { q: "100 / 4", ans: "25" }, { q: "9 - 4", ans: "5" }, { q: "20 * 3", ans: "60" },
            { q: "50 + 50", ans: "100" }, { q: "11 * 2", ans: "22" }, { q: "15 / 3", ans: "5" }, { q: "7 + 7", ans: "14" }, { q: "10 * 10", ans: "100" }
        ]
    };

    function startLevel(lvl) {
        if(lvl > unlocked) return alert("Unlock previous level first!");
        currentLevel = lvl;
        currentScore = 0;
        completedInLvl = [];
        showGrid();
    }

    function showGrid() {
        document.getElementById('level-screen').classList.add('hidden');
        document.getElementById('grid-screen').classList.remove('hidden');
        document.getElementById('play-screen').classList.add('hidden');
        const grid = document.getElementById('number-grid');
        grid.innerHTML = '';
        for(let i=1; i<=10; i++) {
            const btn = document.createElement('button');
            btn.className = completedInLvl.includes(i-1) ? 'num-btn done' : 'num-btn';
            btn.innerText = i;
            btn.disabled = completedInLvl.includes(i-1);
            btn.onclick = () => loadQuestion(i-1);
            grid.appendChild(btn);
        }
    }

    function loadQuestion(idx) {
        document.getElementById('grid-screen').classList.add('hidden');
        document.getElementById('play-screen').classList.remove('hidden');
        document.getElementById('feedback-area').classList.add('hidden');
        const area = document.getElementById('game-area');
        area.innerHTML = '';
        const qData = levelData[currentLevel][idx];
        document.getElementById('question-display').innerText = qData.q || `Unscramble: ${qData.j}`;

        if(currentLevel === 1) { // Quiz
            const div = document.createElement('div');
            div.className = 'ans-grid';
            qData.a.forEach(ans => {
                const b = document.createElement('button');
                b.className = 'ans-btn';
                b.innerText = ans.t;
                b.onclick = () => checkQuiz(b, ans.c, qData.a);
                div.appendChild(b);
            });
            area.appendChild(div);
        } else { // Jumble or Math
            const input = document.createElement('input');
            input.id = "user-input";
            input.placeholder = "Answer here...";
            const b = document.createElement('button');
            b.className = "btn-main";
            b.innerText = "SUBMIT";
            b.onclick = () => checkInput(input.value, qData.c || qData.ans);
            area.appendChild(input);
            area.appendChild(b);
        }
        completedInLvl.push(idx);
    }

    function checkQuiz(btn, isCorrect, allOptions) {
        document.querySelectorAll('.ans-btn').forEach(b => b.disabled = true);
        if(isCorrect) {
            btn.classList.add('correct');
            scorePoint();
        } else {
            btn.classList.add('wrong');
            loseSound.play();
            allOptions.forEach((o, i) => { if(o.c) document.querySelectorAll('.ans-btn')[i].classList.add('correct'); });
        }
        showFeedback(isCorrect);
    }

    function checkInput(val, correct) {
        const isCorrect = val.toUpperCase().trim() === correct.toUpperCase();
        if(isCorrect) scorePoint();
        else {
            loseSound.play();
            document.getElementById('main-box').classList.add('shake');
            setTimeout(() => document.getElementById('main-box').classList.remove('shake'), 400);
        }
        showFeedback(isCorrect, correct);
    }

    function scorePoint() {
        currentScore++;
        winSound.play();
    }

    function showFeedback(isCorrect, correctVal) {
        const f = document.getElementById('feedback-area');
        f.classList.remove('hidden');
        document.getElementById('feedback-text').innerText = isCorrect ? "✅ EXCELLENT!" : `❌ WRONG! Correct: ${correctVal || ''}`;
        document.getElementById('feedback-text').style.color = isCorrect ? 'var(--green)' : 'var(--red)';
    }

    function backToGrid() {
        if(completedInLvl.length === 10) {
            checkLevelPass();
        } else {
            showGrid();
        }
    }

    function checkLevelPass() {
        if(currentScore >= 7) {
            unlocked = Math.max(unlocked, currentLevel + 1);
            alert(`Level Passed! You scored ${currentScore}/10. Next Level Unlocked!`);
            updateLockStatus();
        } else {
            alert(`Try Again! You need 7 points, you got ${currentScore}.`);
        }
        showLevels();
    }

    function updateLockStatus() {
        for(let i=2; i<=4; i++) {
            if(unlocked >= i) {
                document.getElementById(`lv${i}`).classList.remove('locked');
                document.getElementById(`l${i}-status`).innerText = "🔓";
            }
        }
    }

    function showLevels() {
        document.getElementById('level-screen').classList.remove('hidden');
        document.getElementById('grid-screen').classList.add('hidden');
        document.getElementById('play-screen').classList.add('hidden');
    }
</script>
</body>
</html>
