<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Scramble: Gamer Edition 🎮</title>
    <style>
        /* GAMER THEME CSS */
        :root {
            --neon-blue: #00d2ff;
            --neon-pink: #ff007f;
            --dark-bg: #0a0b10;
            --card-bg: #1a1c26;
        }

        body {
            font-family: 'Orbitron', sans-serif; /* You can add Google Fonts if you want */
            background-color: var(--dark-bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .game-box {
            background: var(--card-bg);
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-blue);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            position: relative;
        }

        .scrambled-word {
            font-size: 2.5rem;
            letter-spacing: 10px;
            color: var(--neon-pink);
            text-transform: uppercase;
            margin: 20px 0;
            text-shadow: 0 0 10px var(--neon-pink);
        }

        .emoji-hint { font-size: 3rem; margin-bottom: 10px; }

        input {
            width: 80%;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid var(--neon-blue);
            background: transparent;
            color: white;
            font-size: 1.2rem;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
        }

        .btn {
            background: var(--neon-blue);
            color: black;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .hidden { display: none; }
        
        #message { margin-top: 15px; font-weight: bold; }
        .score-board { position: absolute; top: 15px; right: 20px; color: var(--neon-blue); }
    </style>
</head>
<body>

    <div class="game-box">
        <div class="score-board">XP: <span id="score">0</span></div>

        <div id="start-screen">
            <h1>WORD <span style="color:var(--neon-pink)">RUSH</span> ⚡</h1>
            <p>Unscramble the words to level up!</p>
            <button class="btn" onclick="startGame()">PRESS START</button>
        </div>

        <div id="play-screen" class="hidden">
            <div class="emoji-hint" id="emoji">❓</div>
            <div class="scrambled-word" id="scrambled-text">WORD</div>
            <input type="text" id="user-input" placeholder="Type answer here..." autocomplete="off">
            <br>
            <button class="btn" onclick="checkAnswer()">SUBMIT</button>
            <div id="message"></div>
        </div>

        <div id="result-screen" class="hidden">
            <h2>MISSION COMPLETE 🏆</h2>
            <p>Final XP: <span id="final-xp">0</span></p>
            <button class="btn" onclick="location.reload()">REPLAY</button>
        </div>
    </div>

    <script>
        const words = [
            { correct: "GITHUB", jumbled: "BHUTIG", emoji: "💻" },
            { correct: "GAMER", jumbled: "REMAG", emoji: "🎮" },
            { correct: "IPHONE", jumbled: "PINEHO", emoji: "📱" },
            { correct: "COFFEE", jumbled: "FECOEF", emoji: "☕" },
            { correct: "PIZZA", jumbled: "ZAPZI", emoji: "🍕" },
            { correct: "ROCKET", jumbled: "KERTOC", emoji: "🚀" },
            { correct: "BITCOIN", jumbled: "NIOCTIB", emoji: "🪙" },
            { correct: "GALAXY", jumbled: "XAYAGL", emoji: "🌌" }
        ];

        let currentWordIndex = 0;
        let xp = 0;

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('play-screen').classList.remove('hidden');
            loadNextWord();
        }

        function loadNextWord() {
            if (currentWordIndex < words.length) {
                document.getElementById('scrambled-text').innerText = words[currentWordIndex].jumbled;
                document.getElementById('emoji').innerText = words[currentWordIndex].emoji;
                document.getElementById('user-input').value = "";
                document.getElementById('message').innerText = "";
            } else {
                showFinalResults();
            }
        }

        function checkAnswer() {
            const userGuess = document.getElementById('user-input').value.toUpperCase();
            const correctAnswer = words[currentWordIndex].correct;

            if (userGuess === correctAnswer) {
                xp += 100;
                document.getElementById('score').innerText = xp;
                document.getElementById('message').style.color = "#00ff00";
                document.getElementById('message').innerText = "LEVEL UP! +100 XP ⚡";
                
                currentWordIndex++;
                setTimeout(loadNextWord, 1500);
            } else {
                document.getElementById('message').style.color = "#ff0000";
                document.getElementById('message').innerText = "WRONG! TRY AGAIN 💀";
            }
        }

        function showFinalResults() {
            document.getElementById('play-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-xp').innerText = xp;
        }

        // Allow pressing "Enter" to submit
        document.getElementById("user-input").addEventListener("keyup", function(event) {
            if (event.key === "Enter") {
                checkAnswer();
            }
        });
    </script>
</body>
</html>
