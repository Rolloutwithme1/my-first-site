<!DOCTYPE html>
<html>
<head>
    <title>NEURAL_CORE | Rolloutwithme1</title>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; font-family: 'Orbitron', sans-serif; }
        canvas { display: block; }
        .interface {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; border: 2px solid #ff005533; box-sizing: border-box;
        }
        .core-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #ff0055; text-align: center; pointer-events: auto;
            background: rgba(0,0,0,0.8); padding: 30px; border: 1px solid #ff0055;
            box-shadow: 0 0 50px #ff005544; border-radius: 50%; width: 200px; height: 200px;
            display: flex; flex-direction: column; justify-content: center;
        }
        input { background: #111; border: 1px solid #ff0055; color: #ff0055; margin: 5px 0; padding: 5px; width: 100%; box-sizing: border-box; }
        button { background: #ff0055; color: white; border: none; padding: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="interface">
        <div style="padding: 20px; color: #ff0055;">> CORE_TEMP: STABLE<br>> NEURAL_LINK: ACTIVE</div>
    </div>

    <div class="core-text">
        <small>SYSTEM CORE</small>
        <form action="https://formspree.io/f/mjgakbzq" method="POST">
            <input type="text" name="cmd" placeholder="SYNC_ID" required>
            <button type="submit">STABILIZE</button>
        </form>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let atoms = [];
        const mouse = { x: null, y: null };

        window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });

        class Atom {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.radius = Math.random() * 2 + 1;
                this.speedX = Math.random() * 4 - 2;
                this.speedY = Math.random() * 4 - 2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width || this.x < 0) this.speedX *= -1;
                if (this.y > canvas.height || this.y < 0) this.speedY *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#ff0055';
                ctx.fill();
            }
        }

        function init() {
            for (let i = 0; i < 100; i++) {
                atoms.push(new Atom(Math.random() * canvas.width, Math.random() * canvas.height));
            }
        }

        function connect() {
            for (let i = 0; i < atoms.length; i++) {
                for (let j = i; j < atoms.length; j++) {
                    const dx = atoms[i].x - atoms[j].x;
                    const dy = atoms[i].y - atoms[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 150) {
                        ctx.strokeStyle = `rgba(255, 0, 85, ${1 - distance/150})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(atoms[i].x, atoms[i].y);
                        ctx.lineTo(atoms[j].x, atoms[j].y);
                        ctx.stroke();
                    }
                }
                // Connect to mouse
                const mdx = atoms[i].x - mouse.x;
                const mdy = atoms[i].y - mouse.y;
                const mDist = Math.sqrt(mdx * mdx + mdy * mdy);
                if (mDist < 250) {
                    ctx.strokeStyle = '#ff0055';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(atoms[i].x, atoms[i].y);
                    ctx.lineTo(mouse.x, mouse.y);
                    ctx.stroke();
                }
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.2)'; // Motion blur effect
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            atoms.forEach(atom => { atom.update(); atom.draw(); });
            connect();
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
