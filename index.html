<!DOCTYPE html>
<html>
<head>
    <title>IMPRESSION_v2.0 | Rolloutwithme1</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        .ui-layer {
            position: absolute; top: 20px; left: 20px;
            color: #00ffcc; pointer-events: none;
            text-shadow: 0 0 10px #00ffcc;
        }
        .form-box {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(0, 255, 204, 0.1);
            padding: 20px; border: 1px solid #00ffcc;
            backdrop-filter: blur(5px);
        }
        input, button { 
            background: black; border: 1px solid #00ffcc; 
            color: #00ffcc; padding: 10px; margin-top: 5px; 
        }
    </style>
</head>
<body>

    <div class="ui-layer">
        <h1>NEURAL_LINK_ACTIVE</h1>
        <p>> MOVE MOUSE TO DISTURB PARTICLES</p>
        <p>> STATUS: HIGH_PERFORMANCE</p>
    </div>

    <div class="form-box">
        <form action="https://formspree.io/f/mjgakbzq" method="POST">
            <input type="text" name="name" placeholder="IDENTIFY YOURSELF" required><br>
            <input type="text" name="msg" placeholder="SEND ENCRYPTED MESSAGE"><br>
            <button type="submit">TRANSMIT DATA</button>
        </form>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        const mouse = { x: null, y: null, radius: 150 };

        window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.baseX = this.x;
                this.baseY = this.y;
                this.density = (Math.random() * 30) + 1;
            }
            draw() {
                ctx.fillStyle = '#00ffcc';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }
            update() {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                let forceDirectionX = dx / distance;
                let forceDirectionY = dy / distance;
                let maxDistance = mouse.radius;
                let force = (maxDistance - distance) / maxDistance;
                let directionX = forceDirectionX * force * this.density;
                let directionY = forceDirectionY * force * this.density;

                if (distance < mouse.radius) {
                    this.x -= directionX;
                    this.y -= directionY;
                } else {
                    if (this.x !== this.baseX) {
                        let dx = this.x - this.baseX;
                        this.x -= dx / 10;
                    }
                    if (this.y !== this.baseY) {
                        let dy = this.y - this.baseY;
                        this.y -= dy / 10;
                    }
                }
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < 1500; i++) {
                particles.push(new Particle());
            }
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].draw();
                particles[i].update();
            }
            requestAnimationFrame(animate);
        }
        init();
        animate();
    </script>
</body>
</html>
